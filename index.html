<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>An Evening of Time</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&display=swap');
    :root { --dusk-sky:#1a1a2e;--deep-teal:#16213e;--river:#0f3460;--river-light:#1a4a7a;--gold:#e2b96f;--amber:#c8933a;--willow-green:#2d5a27;--willow-light:#4a8a42;--plum:#4a2040;--fairy-glow:#b8f0d8;--mug-cream:#d4c4a0;--text-light:#f0e8d8;--dialogue-bg:rgba(10,8,20,0.94);--ui-border:#8a6a30;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0812;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'IM Fell English',serif;overflow:hidden;color:var(--text-light);}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999;animation:scanFlicker 8s infinite;}
    @keyframes scanFlicker{0%,97%,100%{opacity:1;}98%{opacity:0.85;}99%{opacity:1;}99.5%{opacity:0.9;}}
    #game-wrapper{position:relative;width:min(900px,100vw);aspect-ratio:16/10;border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.8);background:#000;}
    #intro-screen{position:absolute;inset:0;background:#05030a;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:200;cursor:pointer;}
    #intro-line{font-family:'IM Fell English SC',serif;font-size:1.1rem;color:var(--text-light);max-width:80%;text-align:center;margin-bottom:20px;}
    #intro-hint{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:#888;}
    #title-screen{position:absolute;inset:0;background:radial-gradient(circle at top,#2b2b55 0%,#05030a 60%);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:150;cursor:pointer;overflow:hidden;}
    #title-moon-willow{position:absolute;inset:0;}
    #title-text{position:relative;z-index:2;text-align:center;color:var(--text-light);text-shadow:0 0 8px rgba(0,0,0,0.8);}
    .title-main{font-family:'IM Fell English SC',serif;font-size:2.2rem;margin-bottom:0.4rem;}
    .title-sub{font-style:italic;font-size:1rem;margin-bottom:1rem;color:#d8cbb0;}
    .title-studio{font-family:'Press Start 2P',monospace;font-size:0.55rem;letter-spacing:1px;margin-bottom:1.5rem;color:#b89a5a;}
    .press-start{font-family:'Press Start 2P',monospace;font-size:0.7rem;color:#c7f0ff;animation:blink 1.4s infinite;}
    @keyframes blink{0%,50%{opacity:1;}51%,100%{opacity:0.2;}}
    #game-screen{position:absolute;inset:0;display:none;flex-direction:column;background:radial-gradient(circle at top,#1b1b3a 0%,#05030a 60%);}
    #scene-container{position:relative;flex:1;overflow:hidden;}
    .scene-bg{position:absolute;inset:0;width:100%;height:100%;display:none;}
    .scene-bg.active{display:block;}
    #ui-bar{height:90px;border-top:2px solid var(--ui-border);background:linear-gradient(to top,#120c18,#1f1630);display:flex;flex-direction:column;padding:6px 10px;gap:4px;}
    #action-text{font-size:0.8rem;min-height:1.2rem;color:#f5e9d0;}
    #inventory-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;}
    #inventory-label{font-family:'Press Start 2P',monospace;font-size:0.55rem;color:#c7b38a;margin-right:4px;}
    .inv-item{font-family:'IM Fell English',serif;font-size:0.7rem;padding:3px 6px;border-radius:4px;border:1px solid #8a6a30;background:#221526;color:#f0e8d8;cursor:pointer;}
    .inv-item:hover{background:#3a223f;}
    #dialogue-box{position:absolute;left:50%;bottom:100px;transform:translateX(-50%);width:80%;background:var(--dialogue-bg);border:2px solid var(--ui-border);border-radius:8px;padding:8px 10px;display:none;z-index:50;}
    .dialogue-speaker{font-family:'Press Start 2P',monospace;font-size:0.55rem;color:#f5d49a;margin-bottom:4px;}
    .dialogue-text{font-size:0.8rem;margin-bottom:4px;}
    .dialogue-continue{font-family:'Press Start 2P',monospace;font-size:0.55rem;text-align:right;color:#9ad0ff;cursor:pointer;}
    #dj-daddy-cool{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:130px;height:auto;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.7));z-index:20;}
    #dj-daddy-cool #ddc-body{animation:ddc-breathe 4s ease-in-out infinite;}
    @keyframes ddc-breathe{0%,100%{transform:translateY(0);}50%{transform:translateY(-2px);}}
    #dj-daddy-cool #ddc-fairy{animation:fairy-pulse 3s ease-in-out infinite;}
    @keyframes fairy-pulse{0%,100%{opacity:0.8;transform:translate(78px,68px) scale(1);}50%{opacity:1;transform:translate(78px,66px) scale(1.05);}}
    .hotspot{position:absolute;border-radius:4px;cursor:pointer;}
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="intro-screen">
      <div id="intro-line">
        “Every story that was never told, is a story waiting to unfold.”
      </div>
      <div id="intro-hint">
        [ click to continue ]

        <g transform="translate(120,120)">
          <rect x="0" y="120" width="30" height="140" fill="#3b2a1a" />
          <path d="M15 120 C-40 80 -40 40 15 20 C70 40 70 80 15 120 Z" fill="#2d5a27" />
          <path d="M15 120 C-20 90 -20 60 5 40" stroke="#4a8a42" stroke-width="3" fill="none" />
          <path d="M15 120 C40 90 40 60 25 40" stroke="#4a8a42" stroke-width="3" fill="none" />
        </g>
        <g transform="translate(420,310)">
          <path d="M0 40 Q40 0 80 40 L70 50 L10 50 Z" fill="#0b1120" />
          <path d="M20 40 Q40 10 60 40" stroke="#0b1120" stroke-width="4" fill="none" />

      </svg>
      <div id="title-text">

        <div class="press-start">[ click anywhere to begin ]</div>

    </div>
    <div id="game-screen">
      <div id="scene-container">
        <svg id="scene-dock" class="scene-bg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="dockSky" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#1a1a3a" />
              <stop offset="100%" stop-color="#05030a" />
            </linearGradient>
            <linearGradient id="dockRiver" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#1a4a7a" />
              <stop offset="100%" stop-color="#071827" />
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="800" height="500" fill="url(#dockSky)" />
          <circle cx="650" cy="80" r="40" fill="#f5f0da" opacity="0.9" />
          <path d="M0 320 Q200 300 400 320 T800 320 L800 500 L0 500 Z" fill="url(#dockRiver)" />
          <rect x="0" y="320" width="800" height="40" fill="#1b1418" />
          <rect x="80" y="300" width="200" height="20" fill="#2b1c20" />
          <rect x="520" y="300" width="200" height="20" fill="#2b1c20" />
          <g transform="translate(360,310)">
            <path d="M0 40 Q40 0 80 40 L70 50 L10 50 Z" fill="#0b1120" />
            <path d="M20 40 Q40 10 60 40" stroke="#0b1120" stroke-width="4" fill="none" />
          </g>

        <svg id="scene-opShop" class="scene-bg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="800" height="500" fill="#1b1020" />
          <rect x="80" y="60" width="640" height="380" fill="#26152a" />
          <rect x="100" y="80" width="600" height="40" fill="#3a223f" />

            OP-SHOP

          <rect x="120" y="150" width="560" height="10" fill="#3b2a1a" />
          <rect x="120" y="220" width="560" height="10" fill="#3b2a1a" />

          <rect x="380" y="160" width="40" height="60" fill="#c8933a" />
          <rect x="440" y="160" width="40" height="60" fill="#4a8a42" />
          <rect x="500" y="160" width="40" height="60" fill="#4a2040" />

        <svg id="scene-bulletTrain" class="scene-bg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="800" height="500" fill="#05030a" />

          <rect x="680" y="235" width="40" height="30" rx="6" fill="#0f172a" />
          <circle cx="720" cy="120" r="30" fill="#111827" stroke="#e2b96f" stroke-width="3" />

  <script>
    const GameState={currentSceneId:'dock',inventory:new Set(),flags:{metOpShopWoman:false,receivedRing:false,receivedPuffer:false,metTallWoman:false,receivedStrength:false,vitaminsReminder:false,metamucilReminder:false,metWiseWoman:false,foundClockMessage:false,cafeSundayUnlocked:false,metLittleBoy:false,receivedCalculator:false,binaryPuzzleUnlocked:false,bulletTrainSeen:false,rideShareSeen:false,strength:0,clarity:0,humour:0,love:0}};
    const InventoryItems={chippedMug:{id:'chippedMug',name:'Chipped Mug',description:'A mug with a small chip on the rim. It feels like it’s been held through a lot of late nights.'},soju:{id:'soju',name:'Soju Bottle',description:'Clear, sharp, and a little too honest if you drink it too fast.'},mcdonalds:{id:'mcdonalds',name:'McDonald’s Bag',description:'Smells like salt, regret, and comfort. There’s a receipt crumpled at the bottom.'},titaniumRing:{id:'titaniumRing',name:'Titanium Ring',description:'Cool to the touch. The op-shop woman said it looked like it belonged to someone trying to remember something.'},calculator:{id:'calculator',name:'Calculator',description:'Old-school, chunky buttons. Perfect for spelling things you’re not supposed to say out loud.'},djTable:{id:'djTable',name:'DJ Deck',description:'Scratched but loved. It remembers more nights than you do.'},coffee:{id:'coffee',name:'Coffee',description:'Hot, bitter, necessary. The surface trembles if your hands do.'},music:{id:'music',name:'Playlist',description:'A carefully curated list of songs that say what you won’t.'},computer:{id:'computer',name:'Computer',description:'Tabs open, thoughts scattered. Somewhere in here is the thing you’ve been avoiding.'},tv:{id:'tv',name:'TV',description:'Static, late-night infomercials, and the occasional message that feels like it’s meant for you.'},sofa:{id:'sofa',name:'Sofa',description:'Not in your pocket, but always there. Cushions remember the shape of you.'},pasta:{id:'pasta',name:'Pasta',description:'Carbs as apology. Or reward. Or both.'},metamucil:{id:'metamucil',name:'Metamucil',description:'You’re not old, you’re just… efficient.'},vitamins:{id:'vitamins',name:'Vitamins',description:'Little capsules of “I’m trying, okay?”'},navyPuffer:{id:'navyPuffer',name:'Navy Puffer Jacket',description:'Warm, practical, and heavier than it looks. The op-shop woman insisted you’d need it.'},blackHoodie:{id:'blackHoodie',name:'Black Hoodie',description:'Soft, familiar. The kind of thing you wear when you want to disappear a little.'}};
    const NPCs={opShopWoman:{id:'opShopWoman',dialogue:{intro:[{speaker:'???',text:'You keep looking at the same rack like it’s going to change.'},{speaker:'dj Daddy Cool',text:'I’m just… thinking.'},{speaker:'???',text:'No, you’re remembering. Different thing.'}],gift:[{speaker:'???',text:'Here. This ring looked like it belonged to someone trying to remember something.',effect:()=>{giveItem('titaniumRing');GameState.flags.receivedRing=true;}},{speaker:'???',text:'And this jacket. Nights get cold between stations.',effect:()=>{giveItem('navyPuffer');GameState.flags.receivedPuffer=true;}}],after:[{speaker:'???',text:'You wear it well. Both of them.'}]}},tallWoman:{id:'tallWoman',dialogue:{intro:[{speaker:'???',text:'You look like you’re trying to outrun something.'},{speaker:'dj Daddy Cool',text:'Just getting from A to B.'},{speaker:'???',text:'Trips like this are never just A to B.'}],strength:[{speaker:'???',text:'You don’t have to do it alone. Not every journey is walked.',effect:()=>{GameState.flags.receivedStrength=true;GameState.flags.strength+=1;}},{speaker:'???',text:'Did you take your vitamins today?',effect:()=>{GameState.flags.vitaminsReminder=true;GameState.flags.clarity+=1;}},{speaker:'???',text:'And don’t forget your Metamucil. You think better when your body feels better.',effect:()=>{GameState.flags.metamucilReminder=true;GameState.flags.humour+=1;}}],after:[{speaker:'???',text:'You’re still here. That counts for more than you think.'}]}},wiseWoman:{id:'wiseWoman',dialogue:{clock:[{speaker:'???',text:'Time bends for those who listen.'},{speaker:'???',text:'Meet me at the café. Sunday.',effect:()=>{GameState.flags.metWiseWoman=true;GameState.flags.cafeSundayUnlocked=true;GameState.flags.strength+=1;GameState.flags.love+=1;}}]}},littleBoy:{id:'littleBoy',dialogue:{intro:[{speaker:'Little Boy',text:'You look like me.'},{speaker:'dj Daddy Cool',text:'I know.'},{speaker:'Little Boy',text:'Wanna do binary together?',effect:()=>{giveItem('calculator');GameState.flags.receivedCalculator=true;GameState.flags.binaryPuzzleUnlocked=true;GameState.flags.clarity+=1;GameState.flags.humour+=1;}}],after:[{speaker:'Little Boy',text:'01001000 01001001.'}]}}};
    const Scenes={dock:{id:'dock',svgId:'scene-dock',description:'The river at night. Swan boats, city lights, and the feeling that something is about to start.',hotspots:[{id:'swanBoat',x:360,y:320,w:80,h:40,onClick:()=>{showDialogue([{speaker:'Narrator',text:'Thirty minutes to park it. A lifetime to forget it.'}]);}},{id:'toOpShop',x:700,y:320,w:80,h:60,onClick:()=>changeScene('opShop')},{id:'littleBoy',x:120,y:320,w:60,h:60,onClick:()=>{if(!GameState.flags.metLittleBoy){GameState.flags.metLittleBoy=true;startDialogue(NPCs.littleBoy.dialogue.intro);}else{startDialogue(NPCs.littleBoy.dialogue.after);}}}]},opShop:{id:'opShop',svgId:'scene-opShop',description:'Racks of clothes, mismatched hangers, and the smell of dust and possibility.',hotspots:[{id:'opShopWoman',x:300,y:200,w:80,h:140,onClick:()=>{if(!GameState.flags.met
