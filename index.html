<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>An Evening of Time</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#04101e;
  font-family:'Georgia',serif;color:#e0d8c0;user-select:none}

#canvas-wrap{position:fixed;inset:0;cursor:crosshair}
#gameCanvas{display:block;width:100%;height:100%}

#hud-top{
  position:fixed;top:0;left:0;right:0;
  padding:14px 20px 10px;
  background:linear-gradient(180deg,rgba(4,16,30,.95) 0%,transparent 100%);
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;
}
#chapter-display{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#6a90b8}
#chapter-display span{color:#c8b070;font-style:italic}
#item-count{font-size:.72rem;color:#4a6a88;letter-spacing:.05em}

#story-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(3,10,22,.98) 60%,transparent 100%);
  padding:24px 28px 22px;
  transform:translateY(100%);
  transition:transform .45s cubic-bezier(.25,.8,.25,1);
  pointer-events:none;z-index:100;
}
#story-panel.open{transform:translateY(0)}
#story-speaker{
  font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;
  color:#c8b070;margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
#speaker-dot{width:7px;height:7px;border-radius:50%;background:#c8b070;box-shadow:0 0 8px #c8b070;flex-shrink:0}
#story-text{font-size:.95rem;line-height:1.8;color:#d4cbb0;max-width:700px;white-space:pre-wrap}
#hidden-reveal{
  margin-top:13px;padding:11px 16px;
  background:rgba(50,35,5,.6);border-left:3px solid #c8a830;border-radius:0 6px 6px 0;
  font-style:italic;font-size:.88rem;color:#e8c850;
  display:none;
}
#hidden-reveal.show{display:block}
#story-dismiss{
  position:absolute;bottom:20px;right:28px;
  background:transparent;border:1px solid rgba(255,255,255,.12);
  border-radius:20px;color:#5a7a98;padding:6px 18px;
  font-size:.75rem;font-family:Georgia,serif;cursor:pointer;
  pointer-events:all;transition:all .2s;letter-spacing:.05em;
}
#story-dismiss:hover{color:#a8c8e8;border-color:rgba(255,255,255,.25)}

#hint-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(3,12,24,.88);border:1px solid rgba(100,160,220,.2);
  border-radius:8px;padding:8px 18px;
  font-size:.78rem;color:#5a8ab0;letter-spacing:.04em;
  pointer-events:none;opacity:0;transition:opacity .35s;white-space:nowrap;z-index:50;
}
#hint-bar.show{opacity:1}

#inv-btn{
  position:fixed;top:12px;right:20px;
  background:rgba(6,20,38,.85);border:1px solid rgba(100,160,220,.2);
  border-radius:20px;padding:7px 16px;
  color:#6a90b8;font-size:.74rem;font-family:Georgia,serif;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;z-index:150;
}
#inv-btn:hover{color:#c8e0f8;border-color:rgba(100,160,220,.4)}

#inventory{
  position:fixed;inset:0;z-index:200;
  background:rgba(2,8,18,.97);
  display:none;flex-direction:column;padding:28px;overflow-y:auto;
}
#inventory.open{display:flex}
#inv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
#inv-header h2{font-size:1rem;letter-spacing:.18em;text-transform:uppercase;color:#c8b070}
#inv-close{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:#5a7a98;padding:7px 18px;font-family:Georgia,serif;font-size:.78rem;cursor:pointer;transition:all .2s}
#inv-close:hover{color:#c8e0f8}
#inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:13px}
.inv-card{background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.07);
  padding:16px;display:flex;gap:14px;animation:cardIn .3s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.inv-icon{font-size:2rem;flex-shrink:0;padding-top:2px}
.inv-name{color:#f0e4c0;font-size:.9rem;font-weight:bold;margin-bottom:2px}
.inv-from{color:#4a7a9a;font-size:.71rem;margin-bottom:7px;letter-spacing:.04em;text-transform:uppercase}
.inv-meaning{color:#a8a090;font-size:.8rem;line-height:1.55;margin-bottom:7px}
.inv-msg{color:#c8a030;font-size:.78rem;font-style:italic}
.inv-empty{color:#3a5a78;font-style:italic;font-size:.88rem;padding:20px 0}
#inv-events-wrap{margin-top:24px;border-top:1px solid rgba(255,255,255,.06);padding-top:18px}
#inv-events-wrap h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:#4a6a88;margin-bottom:10px}
.epill{display:inline-block;padding:4px 12px;background:rgba(30,60,100,.35);
  border-radius:14px;font-size:.72rem;color:#7aaac8;margin:3px}

.sp{position:fixed;pointer-events:none;z-index:999;font-size:1.1rem;animation:spUp 1.3s ease forwards}
@keyframes spUp{0%{opacity:1;transform:scale(1) translateY(0) rotate(0)}
  100%{opacity:0;transform:scale(.2) translateY(-90px) rotate(540deg)}}

#chapter-flash{position:fixed;inset:0;background:rgba(200,176,80,.05);
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:300}
#chapter-flash.flash{opacity:1}

#walk-hint{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);
  font-size:.68rem;color:#2a4a62;letter-spacing:.06em;pointer-events:none}
</style>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, dpr = 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  updateCharPositions();
}
window.addEventListener('resize', resize);

// Runtime positions
const charPos = {};
function updateCharPositions() {
  CHARS.forEach(c => { charPos[c.id] = { x: c.cx * W, y: c.cy * H }; });
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let inventory = [], unlockedEvents = [], currentChapter = 0;
let storyOpen = false, hoveredChar = null;
let stars = [], particles = [], t = 0;

function makeStars() {
  stars = Array.from({length:95}, () => ({
    x:Math.random(), y:Math.random()*.55,
    r:.3+Math.random()*1.5,
    phase:Math.random()*Math.PI*2,
    spd:.4+Math.random()*1.3,
    warm:Math.random()<.12
  }));
}
makeStars();

// ══════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════
function drawSky() {
  const g = ctx.createRadialGradient(W*.2,H*.12,0, W*.5,H*.5,W*.95);
  g.addColorStop(0,'#1c3258'); g.addColorStop(.5,'#071228'); g.addColorStop(1,'#020810');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawStars(t) {
  stars.forEach(s => {
    const a = .15 + .75*(0.5+0.5*Math.sin(t*s.spd+s.phase));
    ctx.globalAlpha=a;
    ctx.fillStyle = s.warm ? '#ffe0a0':'#ffffff';
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawMoon(t) {
  const mx=W*.17, my=H*.14, mr=Math.min(W,H)*.062;
  // Halo (always soft, stronger when item collected)
  const halosStrength = inventory.includes('moonhalo') ? 1 : 0.3;
  const pulse = 0.5+0.5*Math.sin(t*.65);
  ctx.globalAlpha = (.08+pulse*.06)*halosStrength;
  const hg = ctx.createRadialGradient(mx,my,mr*.9,mx,my,mr*2.6);
  hg.addColorStop(0,'rgba(255,255,200,0)'); hg.addColorStop(1,'rgba(255,248,180,1)');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(mx,my,mr*2.6,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // Soft glow
  ctx.globalAlpha=.28+pulse*.1;
  const sg=ctx.createRadialGradient(mx,my,0,mx,my,mr*1.7);
  sg.addColorStop(0,'#fffde0'); sg.addColorStop(1,'rgba(240,220,80,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(mx,my,mr*1.7,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // Body
  const mbg=ctx.createRadialGradient(mx-mr*.2,my-mr*.2,0,mx,my,mr);
  mbg.addColorStop(0,'#fffde8'); mbg.addColorStop(.7,'#f5ebb0'); mbg.addColorStop(1,'#deca60');
  ctx.fillStyle=mbg; ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
  // Craters
  ctx.globalAlpha=.17; ctx.fillStyle='#c0a040';
  [[-.3,-.22,.13],[.18,.2,.08],[-.1,.3,.055]].forEach(([dx,dy,dr])=>{
    ctx.beginPath(); ctx.arc(mx+dx*mr*2,my+dy*mr*2,dr*mr*2,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawGround() {
  // Rolling hills
  ctx.fillStyle='#071408';
  ctx.beginPath(); ctx.ellipse(W*.22,H*.74,W*.30,H*.13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#050e06';
  ctx.beginPath(); ctx.ellipse(W*.78,H*.75,W*.32,H*.12,0,0,Math.PI*2); ctx.fill();
  // Ground plane
  const gg=ctx.createLinearGradient(0,H*.72,0,H);
  gg.addColorStop(0,'#0b1c0c'); gg.addColorStop(1,'#040c04');
  ctx.fillStyle=gg; ctx.fillRect(0,H*.72,W,H*.28);
}

function drawRiver(t) {
  const ry=H*.88;
  const rg=ctx.createLinearGradient(0,ry,0,H);
  rg.addColorStop(0,'#1a4878'); rg.addColorStop(1,'#061628');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.ellipse(W*.5,ry+H*.04,W*.6,H*.08,0,0,Math.PI*2); ctx.fill();
  // Shimmer
  [[.10,.895,.40,.900],[.44,.878,.70,.883],[.60,.908,.87,.912]].forEach(([x1,y1,x2,y2],i)=>{
    ctx.globalAlpha=.12+.18*Math.sin(t*.9+i*1.4);
    ctx.strokeStyle='rgba(120,210,255,.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x1*W,y1*H); ctx.lineTo(x2*W,y2*H); ctx.stroke();
  });
  // Moon reflection
  ctx.globalAlpha=.08+.06*Math.sin(t*.7);
  ctx.fillStyle='#f0e880';
  ctx.beginPath(); ctx.ellipse(W*.20,H*.925,W*.025,H*.012,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

function drawWillow(t) {
  const wx=W*.13, wy=H*.60;
  const sway=Math.sin(t*.28)*.022;
  ctx.save();
  ctx.translate(wx,wy+H*.15); ctx.rotate(sway); ctx.translate(-wx,-(wy+H*.15));

  const th=H*.20, tw=W*.008;
  // Trunk
  ctx.strokeStyle='#1a0e04'; ctx.lineWidth=tw*2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(wx,wy+th);
  ctx.bezierCurveTo(wx+tw*3,wy+th*.5, wx-tw,wy+th*.2, wx,wy);
  ctx.stroke();
  // Main branches
  [[-.06,-.3,-.15,-.18],[.06,-.3,.15,-.18],[0,-.1,-.05,-.35]].forEach(([dx1,dy1,dx2,dy2])=>{
    ctx.lineWidth=tw*1.2; ctx.strokeStyle='#120804';
    ctx.beginPath(); ctx.moveTo(wx+dx1*H*.1,wy+dy1*th*1.2); ctx.lineTo(wx+dx2*H*.1,wy+dy2*th*1.2); ctx.stroke();
  });
  // Drooping fronds
  const frondRoots=[[-.15,-.18],[-.08,-.18],[.01,-.05],[.08,-.18],[.15,-.18],[-.04,-.35]];
  ctx.lineWidth=1.5;
  frondRoots.forEach(([dx,dy],fi)=>{
    for(let f=0;f<6;f++){
      const angle=sway+(f-2.5)*.15+dx*1.8;
      const len=H*(.09+f*.016);
      ctx.strokeStyle=f%2===0?'#0d280d':'#102e10';
      ctx.globalAlpha=.65+f*.04;
      ctx.beginPath();
      const rx=wx+dx*H*.1, ry2=wy+dy*th*1.2;
      ctx.moveTo(rx,ry2);
      ctx.bezierCurveTo(rx+Math.sin(angle)*len*.28,ry2+len*.4,
        rx+Math.sin(angle+sway)*.45*len,ry2+len*.72,
        rx+Math.sin(angle+sway*1.4)*.38*len,ry2+len);
      ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
  // Leaf crown
  [[0,0,.075,.07,.90],[-.032,.025,.052,.052,.80],[.032,.02,.052,.052,.80]].forEach(([ox,oy,rx2,ry2,a])=>{
    ctx.globalAlpha=a; ctx.fillStyle='#0d2c0e';
    ctx.beginPath(); ctx.ellipse(wx+ox*W,wy+oy*H,rx2*W,ry2*H,sway,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  // Glow when leaf collected
  if(inventory.includes('willowleaf')){
    const gp=.12+.08*Math.sin(t*1.3);
    ctx.globalAlpha=gp; ctx.strokeStyle='#40c050'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(wx,wy+H*.06,W*.10,H*.18,0,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawCharacter(c,t) {
  const pos=charPos[c.id]; if(!pos) return;
  const {x,y}=pos;
  const r=Math.min(W,H)*.036;
  const hasLeft=c.items.some(id=>!inventory.includes(id));
  const isHov=hoveredChar===c.id;

  // Availability pulse
  if(hasLeft){
    const gp=.5+.5*Math.sin(t*2+c.cx*7);
    ctx.globalAlpha=isHov?.28:(.05+gp*.07);
    const lg=ctx.createRadialGradient(x,y,0,x,y,r*2.4);
    lg.addColorStop(0,c.color); lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(x,y,r*2.4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // Collected glow
  if(!hasLeft){
    ctx.globalAlpha=.12; ctx.strokeStyle='#40a040'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x,y,r*1.4,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Body
  ctx.fillStyle=isHov?c.color+'44':'rgba(4,16,30,.6)';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  if(isHov){
    ctx.strokeStyle=c.color; ctx.lineWidth=2; ctx.globalAlpha=.85;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Emoji
  const fs=r*1.18;
  ctx.font=`${fs}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(c.id==='dj'&&inventory.includes('djspintable')){
    const bob=Math.sin(t*4.5)*3;
    ctx.fillText(c.emoji,x,y+bob);
  } else if(c.id==='fairy'){
    const bob=Math.sin(t*2.3)*H*.018;
    ctx.fillText(c.emoji,x,y+bob);
  } else {
    ctx.fillText(c.emoji,x,y);
  }
  // Small dot if has items
  if(hasLeft&&!isHov){
    const dp=.5+.5*Math.sin(t*2.8+c.cy*9);
    ctx.globalAlpha=.4+dp*.4; ctx.fillStyle=c.color;
    ctx.beginPath(); ctx.arc(x+r*.72,y-r*.72,r*.2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // Label on hover
  if(isHov){
    const left=c.items.filter(id=>!inventory.includes(id)).length;
    const fs2=Math.min(W,H)*.013;
    ctx.font=`bold ${fs2}px Georgia,serif`;
    ctx.fillStyle='#e0d8c0'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(c.label,x,y+r*1.4);
    ctx.font=`${fs2*.88}px Georgia,serif`;
    ctx.fillStyle=left>0?c.color:'#3aa050';
    ctx.fillText(left>0?`${left} item${left>1?'s':''} waiting`:'✓ all collected',x,y+r*1.4+fs2*1.4);
  }
}

function drawFireflies(t) {
  if(Math.random()<.04){
    particles.push({
      x:Math.random()*W, y:H*.3+Math.random()*H*.45,
      vx:(Math.random()-.5)*.5, vy:-Math.random()*.35-.08,
      life:1, decay:.003+Math.random()*.005, r:1.2+Math.random()*2
    });
  }
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
    ctx.globalAlpha=p.life*.38; ctx.fillStyle='#90e060';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
function loop(ts) {
  t=ts/1000;
  ctx.clearRect(0,0,W,H);
  drawSky(); drawStars(t); drawMoon(t); drawGround(); drawRiver(t);
  drawWillow(t);
  CHARS.forEach(c=>drawCharacter(c,t));
  drawFireflies(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════
function xy(e){ return e.touches?[e.touches[0].clientX,e.touches[0].clientY]:[e.clientX,e.clientY]; }

function charAt(px,py){
  let best=null,bestD=Infinity;
  CHARS.forEach(c=>{
    const pos=charPos[c.id];
    const r=Math.min(W,H)*.06;
    const dx=px-pos.x,dy=py-pos.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<r&&d<bestD){bestD=d;best=c;}
  });
  return best;
}

canvas.addEventListener('mousemove',e=>{
  if(storyOpen) return;
  const [px,py]=xy(e);
  const c=charAt(px,py);
  hoveredChar=c?c.id:null;
  canvas.style.cursor=c?'pointer':'crosshair';
  const hint=document.getElementById('hint-bar');
  if(c){
    const left=c.items.filter(id=>!inventory.includes(id)).length;
    hint.textContent=left>0?`Click to approach ${c.label}`:`✓ ${c.label} — all items found`;
    hint.classList.add('show');
  } else { hint.classList.remove('show'); }
  document.getElementById('walk-hint').style.display='none';
});

canvas.addEventListener('click',e=>{
  if(storyOpen)return;
  const [px,py]=xy(e);
  const c=charAt(px,py);
  if(c) approachChar(c);
});

canvas.addEventListener('touchstart',e=>{
  if(storyOpen)return;
  e.preventDefault();
  const [px,py]=xy(e);
  const c=charAt(px,py);
  if(c) approachChar(c);
},{passive:false});

// ══════════════════════════════════════════════
//  INTERACTION — reveal next hidden item
// ══════════════════════════════════════════════
function approachChar(c) {
  const nextId=c.items.find(id=>!inventory.includes(id));
  if(!nextId){
    showStory(c.label,'You\'ve received everything they had for you. Their hands are empty now, but warmer.',null,null);
    return;
  }
  const item=ITEMS.find(i=>i.id===nextId);
  doCollect(item);
}

function doCollect(item) {
  inventory.push(item.id);
  unlockedEvents.push(item.unlocks);
  if(item.id==='fairysparkle') triggerSparkles();
  if(item.id==='computer'&&inventory.includes('key')){
    unlockedEvents.push('Final Hidden Message: "I\'m not going anywhere."');
  }
  updateHUD();
  checkChapterAdvance();
  showStory(item.speaker, item.dialogue, item.hidden, item.reveal, item.emoji+' '+item.name);
}

// ══════════════════════════════════════════════
//  CHAPTERS (auto-check after each collect)
// ══════════════════════════════════════════════
function checkChapterAdvance() {
  if(currentChapter>=CHAPTERS.length-1) return;
  const next=CHAPTERS[currentChapter+1];
  if(!next.requires||inventory.includes(next.requires)){
    currentChapter++;
    document.getElementById('chapter-name').textContent=CHAPTERS[currentChapter].name;
    const el=document.getElementById('chapter-flash');
    el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),500);
  }
}

// ══════════════════════════════════════════════
//  STORY PANEL
// ══════════════════════════════════════════════
function showStory(speaker,dialogue,hidden,reveal,itemLine) {
  document.getElementById('story-speaker-name').textContent=speaker;
  let txt=dialogue;
  if(itemLine) txt+='\n\n— '+itemLine+' —';
  document.getElementById('story-text').textContent=txt;
  const hr=document.getElementById('hidden-reveal');
  hr.classList.remove('show');
  if(hidden){
    document.getElementById('hidden-text').textContent=(reveal||'')+'\n"'+hidden+'"';
    setTimeout(()=>hr.classList.add('show'),1000);
  }
  document.getElementById('story-panel').classList.add('open');
  storyOpen=true;
}

function closeStory(){
  document.getElementById('story-panel').classList.remove('open');
  storyOpen=false;
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateHUD(){
  document.getElementById('item-count').textContent=inventory.length+' / '+ITEMS.length;
}

// ══════════════════════════════════════════════
//  INVENTORY
// ══════════════════════════════════════════════
function openInv(){
  const g=document.getElementById('inv-grid');
  g.innerHTML=inventory.length===0
    ?'<div class="inv-empty">Nothing found yet — walk up to the characters glowing in the scene.</div>'
    :inventory.map(id=>{
      const it=ITEMS.find(i=>i.id===id);
      return `<div class="inv-card"><div class="inv-icon">${it.emoji}</div><div>
        <div class="inv-name">${it.name}</div>
        <div class="inv-from">from ${it.from}</div>
        <div class="inv-meaning">${it.meaning}</div>
        <div class="inv-msg">✦ "${it.hidden}"</div>
      </div></div>`;
    }).join('');
  document.getElementById('inv-events-list').innerHTML=
    unlockedEvents.map(e=>`<span class="epill">↳ ${e}</span>`).join('');
  document.getElementById('inventory').classList.add('open');
}
function closeInv(){ document.getElementById('inventory').classList.remove('open'); }

// ══════════════════════════════════════════════
//  SPARKLES
// ══════════════════════════════════════════════
function triggerSparkles(){
  const gs=['✨','⭐','💫','🌟','·','✦'];
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='sp';
      el.textContent=gs[Math.floor(Math.random()*gs.length)];
      el.style.cssText=`left:${8+Math.random()*78}%;top:${12+Math.random()*65}%;animation-delay:${Math.random()*.5}s`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1800);
    },i*65);
  }
}

// ══════════════════════════════════════════════
//  OPENING
// ══════════════════════════════════════════════
setTimeout(()=>{
  showStory(
    'THE NARRATOR',
    'You are DJ Daddy Cool.\n\nThe evening is yours. Walk through this world — approach each character and place. They are holding something for you. Each thing you find carries a meaning and a hidden message that belongs to you.',
    null, null
  );
},700);
</script>
