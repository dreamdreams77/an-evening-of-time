<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>An Evening of Time — v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020810;
  font-family:'Cormorant Garamond',Georgia,serif;color:#e8e0cc;
  -webkit-tap-highlight-color:transparent;touch-action:none}

/* ── GAME CANVAS ─────────────────── */
#gc{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── FADE CURTAIN ────────────────── */
#curtain{position:fixed;inset:0;background:#020810;z-index:500;
  pointer-events:none;opacity:0;transition:opacity .7s}
#curtain.in{opacity:1;pointer-events:all}

/* ── CHAPTER CARD ────────────────── */
#chapter-card{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(1,5,14,.94);backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;transition:opacity .55s;padding:30px;
}
#chapter-card.show{opacity:1;pointer-events:all}
#cc-icon{font-size:2.6rem;margin-bottom:18px;opacity:.75}
#cc-roman{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.35em;
  color:#3a6890;text-transform:uppercase;margin-bottom:12px}
#cc-name{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4vw,1.7rem);
  font-weight:600;color:#c8b070;text-align:center;margin-bottom:14px;line-height:1.3}
#cc-rule{width:56px;height:1px;background:rgba(200,176,112,.3);margin:0 auto 14px}
#cc-sub{font-size:.92rem;color:#6a8090;font-style:italic;text-align:center;
  max-width:260px;line-height:1.65}
#cc-hint{margin-top:32px;font-family:'Cinzel',serif;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:#2a4862;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── HUD ─────────────────────────── */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;
  background:linear-gradient(180deg,rgba(1,5,14,.9) 0%,transparent 100%);
  padding:10px 16px 24px;display:flex;justify-content:space-between;align-items:center;
  pointer-events:none}
#hud-ch{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.16em;
  text-transform:uppercase;color:#2a5070}
#hud-ch em{color:#c8b070;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:.68rem}
#hud-ct{font-size:.62rem;color:#1e3a52;letter-spacing:.04em}

/* ── COLLECTION BTN ──────────────── */
#inv-btn{position:fixed;top:8px;right:14px;z-index:60;
  background:rgba(2,10,24,.92);border:1px solid rgba(100,160,220,.2);
  border-radius:20px;padding:8px 16px;
  color:#5888b0;font-family:'Cinzel',serif;font-size:.65rem;
  cursor:pointer;letter-spacing:.08em;transition:all .25s}
#inv-btn:hover,#inv-btn:active{color:#c8b070;border-color:rgba(200,176,112,.35)}

/* ── VISUAL NOVEL SCENE ──────────── */
#vn{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .4s}
#vn.open{opacity:1;pointer-events:all}

/* Art area — canvas portrait */
#vn-art{flex:1;position:relative;overflow:hidden;min-height:0}
#vpc{position:absolute;inset:0;width:100%;height:100%;display:block}

/* Floating item */
#vn-float{position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:center;align-items:flex-end;padding-bottom:24px;
  background:linear-gradient(0deg,rgba(1,6,18,.75) 0%,transparent 55%);
  pointer-events:none}
#vn-float-icon{font-size:3.2rem;display:none;
  filter:drop-shadow(0 0 22px rgba(200,176,112,.65));
  animation:floatBob 3s ease-in-out infinite}
@keyframes floatBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* Dialogue box */
#vn-box{flex-shrink:0;background:linear-gradient(0deg,rgba(1,5,16,.98),rgba(2,8,22,.95));
  border-top:1px solid rgba(100,150,220,.1);padding:16px 18px 14px}
#vn-who{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;
  text-transform:uppercase;color:#c8b070;margin-bottom:9px;
  display:flex;align-items:center;gap:7px}
#vn-dot{width:5px;height:5px;border-radius:50%;background:#c8b070;
  box-shadow:0 0 7px #c8b07060;flex-shrink:0}
#vn-words{font-size:.97rem;line-height:1.82;color:#d8d0b8;
  min-height:72px;position:relative;white-space:pre-wrap}
#vn-caret{display:inline-block;width:2px;height:.9em;background:#c8b07090;
  margin-left:1px;vertical-align:text-bottom;animation:caretBlink .75s step-end infinite}
@keyframes caretBlink{0%,100%{opacity:1}50%{opacity:0}}

/* Hidden message */
#vn-hmsg{margin-top:12px;padding:11px 15px;
  background:linear-gradient(135deg,rgba(48,32,4,.75),rgba(28,18,4,.75));
  border:1px solid rgba(200,168,48,.22);border-radius:6px;
  display:none;animation:hmsgIn .7s ease}
#vn-hmsg.show{display:block}
@keyframes hmsgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
#vn-hlabel{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.22em;
  color:#7a6020;text-transform:uppercase;margin-bottom:5px}
#vn-htext{font-style:italic;font-size:.9rem;color:#e8c850;line-height:1.55}
#vn-hmean{font-size:.8rem;color:#908070;line-height:1.5;margin-top:6px}

/* VN nav row */
#vn-nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
#vn-dots{display:flex;gap:5px;align-items:center}
.vdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
.vdot.active{background:#c8b070;box-shadow:0 0 6px #c8b07055;width:14px;border-radius:3px}
.vdot.done{background:rgba(200,176,112,.3)}
#vn-btn{background:rgba(100,155,215,.08);border:1px solid rgba(100,155,215,.18);
  border-radius:18px;padding:9px 22px;color:#78aad8;
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;cursor:pointer;
  transition:all .22s}
#vn-btn:hover,#vn-btn:active{background:rgba(200,176,112,.12);border-color:rgba(200,176,112,.28);color:#c8b070}

/* Minimap / relationship tracker */
#minimap{position:fixed;bottom:16px;right:14px;z-index:55;
  width:88px;background:rgba(1,6,18,.88);border:1px solid rgba(100,160,220,.12);
  border-radius:10px;padding:8px 6px 6px;pointer-events:none}
#mm-title{font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.14em;
  text-transform:uppercase;color:#2a4862;text-align:center;margin-bottom:6px}
#mm-canvas{display:block;width:76px;height:76px;margin:0 auto}

/* ── INVENTORY ───────────────────── */
#inv{position:fixed;inset:0;z-index:400;background:rgba(1,5,14,.97);
  display:none;flex-direction:column;overflow:hidden}
#inv.open{display:flex}
#inv-hdr{flex-shrink:0;padding:16px 18px 12px;
  border-bottom:1px solid rgba(100,150,220,.09);
  display:flex;justify-content:space-between;align-items:center}
#inv-hdr h2{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.18em;
  text-transform:uppercase;color:#c8b070}
#inv-x{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:#4a7090;padding:7px 15px;font-family:'Cinzel',serif;font-size:.65rem;
  cursor:pointer;letter-spacing:.06em;transition:all .2s}
#inv-x:hover{color:#c8b070;border-color:rgba(200,176,112,.3)}
#inv-body{flex:1;overflow-y:auto;padding:14px 18px}

.inv-sec{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.2em;
  text-transform:uppercase;color:#1e3a52;margin:14px 0 7px;
  padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.04)}
.inv-sec:first-child{margin-top:0}

.icard{display:flex;gap:12px;padding:13px 12px;margin-bottom:7px;
  background:rgba(255,255,255,.028);border-radius:9px;
  border:1px solid rgba(255,255,255,.055);cursor:pointer;transition:all .2s}
.icard:hover,.icard:active{background:rgba(200,176,112,.06);border-color:rgba(200,176,112,.18)}
.ic-em{font-size:1.7rem;flex-shrink:0;line-height:1}
.ic-name{color:#f0e4c0;font-size:.88rem;font-weight:600}
.ic-from{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.1em;
  text-transform:uppercase;color:#2e5870;margin-top:1px}
.ic-unlocks{font-size:.72rem;color:#3a6040;margin-top:3px}

.inv-empty{color:#1e3a52;font-style:italic;font-size:.88rem;
  padding:28px 0;text-align:center;line-height:1.8}
#inv-scenes{margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05)}
#inv-scenes h3{font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.2em;
  text-transform:uppercase;color:#1e3a52;margin-bottom:9px}
.epill{display:inline-block;padding:3px 11px;background:rgba(18,48,82,.4);
  border-radius:12px;font-size:.68rem;color:#507898;margin:3px}

/* ── EXAMINE ─────────────────────── */
#examine{position:fixed;inset:0;z-index:450;background:rgba(1,5,14,.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;text-align:center}
#examine.open{display:flex}
#ex-em{font-size:3.8rem;margin-bottom:18px;
  filter:drop-shadow(0 0 28px rgba(200,176,112,.55));
  animation:floatBob 3s ease-in-out infinite}
#ex-name{font-family:'Cinzel',serif;font-size:1.1rem;color:#c8b070;
  letter-spacing:.12em;margin-bottom:4px}
#ex-from{font-family:'Cinzel',serif;font-size:.57rem;letter-spacing:.18em;
  text-transform:uppercase;color:#2e5870;margin-bottom:18px}
#ex-hr{width:44px;height:1px;background:rgba(200,176,112,.22);margin:0 auto 18px}
#ex-meaning{font-size:.92rem;line-height:1.72;color:#a09880;max-width:300px;margin-bottom:16px}
#ex-hidden{font-style:italic;font-size:.92rem;color:#e8c850;
  padding:12px 18px;background:rgba(48,32,4,.55);
  border:1px solid rgba(200,168,48,.18);border-radius:7px;
  max-width:300px;margin-bottom:24px;line-height:1.6}
#ex-back{background:transparent;border:1px solid rgba(255,255,255,.1);
  border-radius:20px;color:#3a6888;padding:10px 28px;
  font-family:'Cinzel',serif;font-size:.67rem;cursor:pointer;letter-spacing:.1em}

/* ── SPARKLES ────────────────────── */
.sp{position:fixed;pointer-events:none;z-index:600;
  animation:spUp 1.5s ease forwards}
@keyframes spUp{
  0%{opacity:1;transform:scale(1) translateY(0) rotate(0)}
  100%{opacity:0;transform:scale(.1) translateY(-110px) rotate(660deg)}}

/* ── TAP HINT ────────────────────── */
#taphint{position:fixed;bottom:26px;left:0;right:0;text-align:center;
  font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.18em;
  text-transform:uppercase;color:#182838;pointer-events:none;z-index:10;
  animation:pulse 2.8s ease-in-out infinite}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="curtain"></div>

<!-- Chapter card -->
<div id="chapter-card">
  <div id="cc-icon">🌙</div>
  <div id="cc-roman">Chapter I</div>
  <div id="cc-name">Moonlit Arrival</div>
  <div id="cc-rule"></div>
  <div id="cc-sub">The evening opens.</div>
  <div id="cc-hint">Tap anywhere to begin</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-ch">Chapter: <em id="hud-cname">Moonlit Arrival</em></div>
  <div id="hud-ct">0 / 21</div>
</div>
<button id="inv-btn" onclick="openInv()">✦ Collection</button>

<!-- Minimap -->
<div id="minimap">
  <div id="mm-title">Characters</div>
  <canvas id="mm-canvas" width="76" height="76"></canvas>
</div>

<!-- Visual Novel -->
<div id="vn">
  <div id="vn-art">
    <canvas id="vpc"></canvas>
    <div id="vn-float"><div id="vn-float-icon"></div></div>
  </div>
  <div id="vn-box">
    <div id="vn-who"><div id="vn-dot"></div><span id="vn-speaker"></span></div>
    <div id="vn-words"><span id="vn-txt"></span><span id="vn-caret"></span></div>
    <div id="vn-hmsg">
      <div id="vn-hlabel">✦ Hidden Message</div>
      <div id="vn-htext"></div>
      <div id="vn-hmean"></div>
    </div>
    <div id="vn-nav">
      <div id="vn-dots"></div>
      <button id="vn-btn" onclick="vnAdvance()">Continue →</button>
    </div>
  </div>
</div>

<!-- Inventory -->
<div id="inv">
  <div id="inv-hdr">
    <h2>✦ DJ Daddy Cool's Collection</h2>
    <button id="inv-x" onclick="closeInv()">✕ Close</button>
  </div>
  <div id="inv-body" id="inv-body"></div>
</div>

<!-- Examine item -->
<div id="examine">
  <div id="ex-em"></div>
  <div id="ex-name"></div>
  <div id="ex-from"></div>
  <div id="ex-hr"></div>
  <div id="ex-meaning"></div>
  <div id="ex-hidden"></div>
  <button id="ex-back" onclick="closeExamine()">← Back</button>
</div>

<div id="taphint">Tap a glowing character to approach</div>

<script>
'use strict';
/* ═══════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════ */
const gc=document.getElementById('gc');
const g=gc.getContext('2d');
const vpc=document.getElementById('vpc');
const vp=vpc.getContext('2d');
const mmc=document.getElementById('mm-canvas');
const mm=mmc.getContext('2d');
let W=0,H=0,dpr=1,PORT=false;
let VW=0,VH=0;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight; PORT=H>W;
  gc.width=W*dpr; gc.height=H*dpr;
  g.setTransform(dpr,0,0,dpr,0,0);
  resizeVPC();
}
function resizeVPC(){
  VW=vpc.offsetWidth||W; VH=vpc.offsetHeight||Math.floor(H*.52);
  vpc.width=VW*dpr; vpc.height=VH*dpr;
  vp.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',()=>{resize();buildWorld();});
resize();

/* ═══════════════════════════════════════════
   ITEM DATA  (21 items, correct attributions)
═══════════════════════════════════════════ */
const ITEMS=[
  // ── THE LITTLE BOY
  {id:'feather',   e:'🪶',name:'Feather',        from:'The Little Boy',       giver:'boy',
   meaning:'Childhood softness, innocence — the part of you that still needs gentleness.',
   hidden:'You were always trying.',      unlocks:'River Memory',
   pages:[
     {who:'THE LITTLE BOY',txt:'He holds it out without meeting your eyes.'},
     {who:'THE LITTLE BOY',txt:'Like he\'s been keeping it safe — until you were ready to carry it.'},
     {who:'DJ DADDY COOL', txt:'The feather is lighter than you remember being.'},
   ]},
  {id:'stone',     e:'🪨',name:'Stone',           from:'The Little Boy',       giver:'boy',
   meaning:'The weight you carried as a child — the heaviness you didn\'t have words for.',
   hidden:'You didn\'t deserve that weight.',  unlocks:'Time Loop',
   pages:[
     {who:'THE LITTLE BOY',txt:'Both hands. He places it in yours slowly.'},
     {who:'THE LITTLE BOY',txt:'Like he\'s been carrying this a long time. And finally found the right person.'},
     {who:'DJ DADDY COOL', txt:'The stone is heavier than it looks. You\'ve been carrying this longer than you knew.'},
   ]},
  {id:'calculator',e:'🧮',name:'Calculator',      from:'The Little Boy',       giver:'boy',
   meaning:'Logic, problem-solving — the way you tried to make sense of things too early.',
   hidden:'You didn\'t have to figure it all out alone.',  unlocks:'Calculator Puzzle',
   pages:[
     {who:'THE LITTLE BOY',txt:'He hands it over shyly.'},
     {who:'THE LITTLE BOY',txt:'All those numbers you punched in, trying to solve what couldn\'t be solved with numbers.'},
     {who:'DJ DADDY COOL', txt:'Some things can\'t be calculated. You know that now.'},
   ]},
  {id:'mcdonalds', e:'🍟',name:"McDonald's Bag",  from:'The Little Boy',       giver:'boy',
   meaning:'Nostalgia, comfort food — childhood love arriving in ordinary forms.',
   hidden:'You were loved in small ways.',    unlocks:'Memory Cutscene',
   pages:[
     {who:'THE LITTLE BOY',txt:'He grins and holds it out with both hands.'},
     {who:'THE LITTLE BOY',txt:'The smell hits first. You know exactly which Saturday morning this is.'},
     {who:'DJ DADDY COOL', txt:'Cold fries and warm feelings. Someone tried. That counts for everything.'},
   ]},
  {id:'pasta',     e:'🍝',name:'Pasta',            from:'The Little Boy',       giver:'boy',
   meaning:'Home, warmth — the simple things that kept you going.',
   hidden:'You were cared for.',              unlocks:'Kitchen Memory',
   pages:[
     {who:'THE LITTLE BOY',txt:'He presents it solemnly. Like it\'s the most important thing.'},
     {who:'THE LITTLE BOY',txt:'Steam still rising. Someone made this for you.'},
     {who:'DJ DADDY COOL', txt:'A bowl. A kitchen. Someone who loved you the best way they knew.'},
   ]},
  // ── THE OP-SHOP WOMAN
  {id:'ring',      e:'💍',name:'Ring',             from:'The Op-Shop Woman',    giver:'opshop',
   meaning:'A promise, a connection — a future possibility.',
   hidden:'Some things find you twice.',      unlocks:"Tall Woman's Corridor",
   pages:[
     {who:'THE OP-SHOP WOMAN',txt:'She doesn\'t say where it came from.'},
     {who:'THE OP-SHOP WOMAN',txt:'Presses it into your palm. Turns back to the shelf. It fits perfectly.'},
     {who:'DJ DADDY COOL',    txt:'It was always going to be yours.'},
   ]},
  {id:'puffer',    e:'🧥',name:'Puffer Jacket',    from:'The Op-Shop Woman',    giver:'opshop',
   meaning:'Warmth, safety, comfort — the feeling of being held.',
   hidden:"You're allowed to be warm.",       unlocks:'Deep Forest',
   pages:[
     {who:'THE OP-SHOP WOMAN',txt:'"Here."'},
     {who:'THE OP-SHOP WOMAN',txt:'She doesn\'t explain. It smells like cedar and old kindness.'},
     {who:'DJ DADDY COOL',    txt:'The forest won\'t frighten you now. You are held.'},
   ]},
  {id:'coffee',    e:'☕',name:'Chipped Mug',      from:'The Op-Shop Woman',    giver:'opshop',
   meaning:'Imperfection, real life — the beauty in things that aren\'t pristine.',
   hidden:"You don't have to be perfect to be loved.",   unlocks:'Hidden DJ Scene',
   pages:[
     {who:'THE OP-SHOP WOMAN',txt:'You notice the chip first.'},
     {who:'THE OP-SHOP WOMAN',txt:'"That\'s the best one," she says. She completely means it.'},
     {who:'DJ DADDY COOL',    txt:'Chipped on one side. Still holds everything you need it to hold.'},
   ]},
  {id:'titanium',  e:'⭕',name:'Titanium Ring',    from:'The Op-Shop Woman',    giver:'opshop',
   meaning:'Strength, durability — the unbreakable parts of you.',
   hidden:"You're stronger than you think.",  unlocks:"Wise Woman's Blessing",
   pages:[
     {who:'THE OP-SHOP WOMAN',txt:'It was on the shelf you almost didn\'t look at.'},
     {who:'THE OP-SHOP WOMAN',txt:'She nods when you pick it up. "That one\'s been waiting."'},
     {who:'DJ DADDY COOL',    txt:'Titanium doesn\'t bend. Neither do the deepest parts of you.'},
   ]},
  {id:'soju',      e:'🍶',name:'Soju',             from:'The Op-Shop Woman',    giver:'opshop',
   meaning:'Release, honesty — the moments where walls come down.',
   hidden:'You can tell the truth here.',     unlocks:'Late-Night Dialogue',
   pages:[
     {who:'THE OP-SHOP WOMAN',txt:'She wasn\'t supposed to have this in the back room.'},
     {who:'THE OP-SHOP WOMAN',txt:'Neither were you. Perfect.'},
     {who:'DJ DADDY COOL',    txt:'Walls come down slowly. Then all at once. You say something true.'},
   ]},
  {id:'sofa',      e:'🛋️',name:'Sofa',            from:'The Op-Shop Woman',    giver:'opshop',
   meaning:'Rest, softness — the place where you finally let yourself collapse.',
   hidden:'You deserve rest.',                unlocks:'Cozy Hidden Scene',
   pages:[
     {who:'THE OP-SHOP WOMAN',txt:'"Sit down for a minute."'},
     {who:'THE OP-SHOP WOMAN',txt:'You didn\'t know how tired you were until you did.'},
     {who:'DJ DADDY COOL',    txt:'Your whole body exhales. You didn\'t know you needed this.'},
   ]},
  // ── THE TALL WOMAN  (Metamucil IS hers)
  {id:'metamucil', e:'🧃',name:'Metamucil',        from:'The Tall Woman',       giver:'tall',
   meaning:'Humor, grounding — the silly parts of life that keep you human.',
   hidden:'Not everything has to be serious.',  unlocks:"Fairy's Comedic Message",
   pages:[
     {who:'THE TALL WOMAN',txt:'She produces it with complete seriousness.'},
     {who:'THE TALL WOMAN',txt:'Then catches your eye. You both lose it entirely.'},
     {who:'DJ DADDY COOL', txt:'You laugh for longer than is necessary. It feels incredible.'},
   ]},
  {id:'notebook',  e:'📓',name:'Notebook',          from:'The Tall Woman',       giver:'tall',
   meaning:'Future plans, dreams — the things you\'re scared to write down.',
   hidden:"You're allowed to want things.",    unlocks:'Willow Dialogue',
   pages:[
     {who:'THE TALL WOMAN',txt:'She holds it out like she already knows what you\'ll write.'},
     {who:'THE TALL WOMAN',txt:'"It doesn\'t bite," she says.'},
     {who:'DJ DADDY COOL', txt:'Open it near the willow. The pages glow with things you haven\'t said yet.'},
   ]},
  {id:'vitamins',  e:'💊',name:'Vitamins',          from:'The Tall Woman',       giver:'tall',
   meaning:'Care, maintenance — the small things that keep you going.',
   hidden:"You're worth taking care of.",      unlocks:'Time Loop Energy',
   pages:[

function drawSky(){
  const sky=g.createLinearGradient(0,0,0,H*.7);
  sky.addColorStop(0,'#010508');
  sky.addColorStop(.3,'#050d22');
  sky.addColorStop(.65,'#07182a');
  sky.addColorStop(1,'#091e18');
  g.fillStyle=sky; g.fillRect(0,0,W,H*.7);
  // Aurora wisps
  for(let i=0;i<3;i++){
    const ax=W*(.18+i*.3+Math.sin(T*.15+i*2)*.07);
    const ay=H*(.06+i*.03);
    const aur=g.createRadialGradient(ax,ay,0,ax,ay,W*.2);
    aur.addColorStop(0,['rgba(15,70,110,.05)','rgba(20,90,55,.04)','rgba(60,30,110,.04)'][i]);
    aur.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=aur; g.fillRect(0,0,W,H*.5);
  }
}

function drawStars(){
  stars.forEach(s=>{
    const a=.1+.78*(.5+.5*Math.sin(T*s.sp+s.ph));
    g.globalAlpha=a; g.fillStyle=s.warm?'#ffe090':'#dde8ff';
    g.beginPath(); g.arc(s.px*W,s.py*H,s.r,0,Math.PI*2); g.fill();
  });
  g.globalAlpha=1;
  // Faint Milky Way
  const mw=g.createLinearGradient(W*.05,H*.03,W*.9,H*.42);
  mw.addColorStop(0,'rgba(200,215,255,0)');
  mw.addColorStop(.4,'rgba(200,215,255,.018)');
  mw.addColorStop(.6,'rgba(215,225,255,.025)');
  mw.addColorStop(1,'rgba(200,215,255,0)');
  g.fillStyle=mw; g.fillRect(0,0,W,H*.48);
}

function drawMoon(){
  const mp=POS.moon; if(!mp) return;
  const mr=Math.min(W,H)*(PORT?.055:.062);
  const pulse=.5+.5*Math.sin(T*.55);
  const halos=inventory.includes('moonhalo')?1:.18;
  // Multi-layer halo
  for(let i=0;i<4;i++){
    g.globalAlpha=(.03+pulse*.02)*halos*(4-i)*.3;
    const hr=mr*(2+i*.7);
    const hg=g.createRadialGradient(mp.x,mp.y,mr*.85,mp.x,mp.y,hr);
    hg.addColorStop(0,'rgba(255,255,200,0)'); hg.addColorStop(1,'rgba(255,248,165,.9)');
    g.fillStyle=hg; g.beginPath(); g.arc(mp.x,mp.y,hr,0,Math.PI*2); g.fill();
  }
  g.globalAlpha=1;
  // Bloom
  g.globalAlpha=.18+pulse*.07;
  const bl=g.createRadialGradient(mp.x,mp.y,0,mp.x,mp.y,mr*2);
  bl.addColorStop(0,'#fffde0'); bl.addColorStop(1,'rgba(240,218,70,0)');
  g.fillStyle=bl; g.beginPath(); g.arc(mp.x,mp.y,mr*2,0,Math.PI*2); g.fill();
  g.globalAlpha=1;
  // Disc
  const disc=g.createRadialGradient(mp.x-mr*.28,mp.y-mr*.28,0,mp.x,mp.y,mr);
  disc.addColorStop(0,'#fffef2'); disc.addColorStop(.55,'#f8eeba'); disc.addColorStop(1,'#d4c055');
  g.fillStyle=disc; g.beginPath(); g.arc(mp.x,mp.y,mr,0,Math.PI*2); g.fill();
  // Craters
  g.globalAlpha=.11;
  [[-.26,-.2,.14],[.2,.22,.09],[-.08,.3,.06]].forEach(([dx,dy,dr])=>{
    const cg=g.createRadialGradient(mp.x+dx*mr*2,mp.y+dy*mr*2,0,mp.x+dx*mr*2,mp.y+dy*mr*2,dr*mr*2);
    cg.addColorStop(0,'rgba(140,110,20,.9)'); cg.addColorStop(1,'rgba(140,110,20,0)');
    g.fillStyle=cg; g.beginPath(); g.arc(mp.x+dx*mr*2,mp.y+dy*mr*2,dr*mr*2,0,Math.PI*2); g.fill();
  });
  g.globalAlpha=1;
}

function drawLandscape(){
  const gy=PORT?H*.62:H*.66;
  // Distant hills — 3 layers of depth
  [[.14,.73,.25,.11,'#050e07'],[.50,.75,.34,.09,'#040c06'],[.84,.72,.27,.11,'#050e07']].forEach(([cx,cy,rx,ry,c])=>{
    g.fillStyle=c; g.beginPath(); g.ellipse(cx*W,cy*H,rx*W,ry*H,0,0,Math.PI*2); g.fill();
  });
  // Ground plane
  const gr=g.createLinearGradient(0,gy,0,H);
  gr.addColorStop(0,'#0d1e0e'); gr.addColorStop(.5,'#08120a'); gr.addColorStop(1,'#030705');
  g.fillStyle=gr; g.fillRect(0,gy,W,H-gy);
  // Ground ambient glow
  g.globalAlpha=.055;
  const ga=g.createLinearGradient(0,gy,0,gy+H*.14);
  ga.addColorStop(0,'#40a840'); ga.addColorStop(1,'rgba(30,80,30,0)');
  g.fillStyle=ga; g.fillRect(0,gy,W,H*.16);
  g.globalAlpha=1;
  // Grass tufts along ground edge
  g.strokeStyle='#1a3c18'; g.lineWidth=1.4; g.lineCap='round';
  for(let i=0;i<34;i++){
    const gx2=W*(.02+i*.029);
    const gy2=gy+H*.008+Math.sin(i*1.9)*H*.006;
    const gh=H*(.011+Math.sin(i*2.7)*.005);
    const sw=Math.sin(T*.28+i*.6)*.018;
    g.globalAlpha=.35+Math.sin(i*.9)*.12;
    g.beginPath(); g.moveTo(gx2,gy2); g.quadraticCurveTo(gx2+sw*W,gy2-gh*.5,gx2+sw*W*.4,gy2-gh); g.stroke();
  }
  g.globalAlpha=1;
}

function drawRiver(){
  const ry=PORT?H*.83:H*.87;
  const rh=H*.11;
  const rg=g.createLinearGradient(0,ry,0,ry+rh);
  rg.addColorStop(0,'#1a4878'); rg.addColorStop(.5,'#103060'); rg.addColorStop(1,'#061428');
  g.fillStyle=rg;
  g.beginPath(); g.ellipse(W*.5,ry+rh*.35,W*.58,rh*.65,0,0,Math.PI*2); g.fill();
  // Moon reflection on river
  g.globalAlpha=.04+.04*Math.sin(T*.7);
  const mr2=g.createRadialGradient(W*.20,ry+rh*.3,0,W*.20,ry+rh*.3,W*.04);
  mr2.addColorStop(0,'#fffde0'); mr2.addColorStop(1,'rgba(255,250,190,0)');
  g.fillStyle=mr2; g.beginPath(); g.arc(W*.20,ry+rh*.3,W*.04,0,Math.PI*2); g.fill();
  g.globalAlpha=1;
  // Shimmer lines
  [[.12,.01,.40,.025],[.44,-.01,.68,.015],[.62,.03,.86,.04]].forEach(([x1,d1,x2,d2],i)=>{
    g.globalAlpha=.07+.14*Math.sin(T*.82+i*1.6);
    g.strokeStyle='rgba(110,205,255,.95)'; g.lineWidth=1.2;
    g.beginPath(); g.moveTo(x1*W,ry+d1*rh); g.lineTo(x2*W,ry+d2*rh); g.stroke();
  });
  g.globalAlpha=1;
}

function drawWillow(){
  const wp=POS.willow; if(!wp) return;
  const wx=wp.x,wy=wp.y,sc=Math.min(W,H)/600;
  const sw=Math.sin(T*.25)*.018;
  g.save();
  g.translate(wx,wy+85*sc); g.rotate(sw); g.translate(-wx,-(wy+85*sc));
  // Roots
  g.strokeStyle='#0e0804'; g.lineWidth=3*sc; g.lineCap='round';
  [-.1,.1].forEach(d=>{
    g.beginPath(); g.moveTo(wx,wy+105*sc); g.quadraticCurveTo(wx+d*90*sc,wy+110*sc,wx+d*130*sc,wy+114*sc); g.stroke();
  });
  // Trunk
  g.lineWidth=10*sc; g.strokeStyle='#170b03';
  g.beginPath(); g.moveTo(wx,wy+105*sc);
  g.bezierCurveTo(wx+7*sc,wy+62*sc,wx-5*sc,wy+30*sc,wx,wy); g.stroke();
  // Bark highlight
  g.lineWidth=2.2*sc; g.strokeStyle='rgba(70,40,12,.22)';
  g.beginPath(); g.moveTo(wx+3*sc,wy+92*sc); g.bezierCurveTo(wx+5*sc,wy+55*sc,wx,wy+28*sc,wx+2*sc,wy+10*sc); g.stroke();
  // Branches
  [[-30*sc,-22*sc,-58*sc,-10*sc],[30*sc,-20*sc,56*sc,-9*sc],[0,-10*sc,-20*sc,-32*sc],[0,-10*sc,20*sc,-32*sc]].forEach(([x1,y1,x2,y2])=>{
    g.lineWidth=3.5*sc; g.strokeStyle='#130902';
    g.beginPath(); g.moveTo(wx+x1,wy+y1); g.lineTo(wx+x2,wy+y2); g.stroke();
  });
  // Canopy layers
  [[0,0,50*sc,42*sc,.88,'#0b2a0b'],[-.28*52*sc,.14*52*sc,35*sc,31*sc,.80,'#0d300d'],[.26*52*sc,.12*52*sc,35*sc,31*sc,.80,'#0c2c0c'],[.06*52*sc,-.2*52*sc,28*sc,22*sc,.72,'#103410']].forEach(([ox,oy,rx,ry2,a,c])=>{
    g.globalAlpha=a; g.fillStyle=c;
    g.beginPath(); g.ellipse(wx+ox,wy+oy,rx,ry2,sw,0,Math.PI*2); g.fill();
  });
  g.globalAlpha=1;
  // Drooping fronds
  g.lineCap='round';
  [[-52*sc,-9*sc],[-30*sc,-5*sc],[-10*sc,5*sc],[14*sc,-5*sc],[36*sc,-9*sc],[0,4*sc],[-20*sc,-24*sc],[18*sc,-24*sc]].forEach(([dx,dy])=>{
    for(let f=0;f<5;f++){
      const ang=sw+(f-2)*.15+dx*.002;
      const len=(52+f*13)*sc;
      g.lineWidth=(1.1+f*.08)*sc;
      g.strokeStyle=f%2?'#0e2e0e':'#123012';
      g.globalAlpha=.56+f*.06;
      g.beginPath(); g.moveTo(wx+dx,wy+dy);
      g.bezierCurveTo(wx+dx+Math.sin(ang)*len*.26,wy+dy+len*.38,wx+dx+Math.sin(ang+sw)*.46*len,wy+dy+len*.72,wx+dx+Math.sin(ang+sw*1.5)*.35*len,wy+dy+len);
      g.stroke();
    }
  });
  g.globalAlpha=1;
  // Bioluminescent glow if leaf collected
  if(inventory.includes('willowleaf')){
    const gp=.07+.055*Math.sin(T*1.4);
    g.globalAlpha=gp; g.strokeStyle='#50d060'; g.lineWidth=1.5;
    g.beginPath(); g.ellipse(wx,wy+22*sc,58*sc,100*sc,0,0,Math.PI*2); g.stroke();
    g.globalAlpha=gp*.45; g.fillStyle='rgba(55,190,75,.3)';
    g.beginPath(); g.ellipse(wx,wy+22*sc,58*sc,100*sc,0,0,Math.PI*2); g.fill();
    g.globalAlpha=1;
  }
  g.restore();
}

function drawFairy(){
  const fp=POS.fairy; if(!fp) return;
  const bob=Math.sin(T*2.3)*H*.018;
  const fx=fp.x,fy=fp.y+bob;
  const fr=Math.min(W,H)*.017;
  // Wing glow
  g.globalAlpha=.3+.18*Math.sin(T*4.2);
  const wg=g.createRadialGradient(fx,fy,0,fx,fy,fr*3.2);
  wg.addColorStop(0,'rgba(130,255,195,.85)'); wg.addColorStop(1,'rgba(130,255,195,0)');
  g.fillStyle=wg; g.beginPath(); g.arc(fx,fy,fr*3.2,0,Math.PI*2); g.fill();
  g.globalAlpha=1;
  // Wings
  g.globalAlpha=.5+.1*Math.sin(T*6);
  [[-1.6,-.3,1.5,.95,.5],[1.6,-.3,1.5,.95,-.5]].forEach(([ox,oy,rx,ry,ang])=>{
    g.fillStyle='rgba(170,245,215,.5)';
    g.beginPath(); g.ellipse(fx+ox*fr,fy+oy*fr,rx*fr,ry*fr,ang,0,Math.PI*2); g.fill();
  });
  g.globalAlpha=1;
  // Body (head)
  g.fillStyle='#f0d0b8';
  g.beginPath(); g.arc(fx,fy,fr,0,Math.PI*2); g.fill();
  // Wand sparkle
  const ws=.5+.5*Math.sin(T*3.2);
  g.globalAlpha=.55+ws*.3;
  const wsg=g.createRadialGradient(fx+fr*1.5,fy-fr*1.5,0,fx+fr*1.5,fy-fr*1.5,fr*1.1);
  wsg.addColorStop(0,'#ffe840'); wsg.addColorStop(1,'rgba(255,232,40,0)');
  g.fillStyle=wsg; g.beginPath(); g.arc(fx+fr*1.5,fy-fr*1.5,fr*1.1,0,Math.PI*2); g.fill();
  g.globalAlpha=1;
  if(inventory.includes('fairysparkle')){
    for(let i=0;i<6;i++){
      const sa=T*2.2+i*.9;
      g.globalAlpha=.25+.2*Math.sin(T*2+i);
      g.fillStyle='#ffe840';
      g.beginPath(); g.arc(fx+Math.cos(sa)*fr*(2+i*.4),fy+Math.sin(sa)*fr*(1+i*.2),fr*.18,0,Math.PI*2); g.fill();
    }
    g.globalAlpha=1;
  }
}

/* ── CHARACTER SPRITES ─────────────────── */
function drawCharSprite(c){
  const p=POS[c.id]; if(!p) return;
  if(c.id==='willow'||c.id==='fairy') return;
  const {x,y}=p;
  const r=Math.min(W,H)*(PORT?.048:.040);
  const hasLeft=c.items.some(id=>!inventory.includes(id));
  const t3=T*2.2+c.vx*9;
  // Glow rings
  if(hasLeft){
    const gp=.5+.5*Math.sin(t3);
    for(let ring=0;ring<2;ring++){
      const rg=g.createRadialGradient(x,y,r*(1+ring*.5),x,y,r*(2.8+ring*.5));
      rg.addColorStop(0,c.col+'66'); rg.addColorStop(1,'rgba(0,0,0,0)');
      g.globalAlpha=(_pressed===c.id?.22:(.038+gp*.058))*(1-ring*.5);
      g.fillStyle=rg; g.beginPath(); g.arc(x,y,r*(2.8+ring*.5),0,Math.PI*2); g.fill();
    }
    g.globalAlpha=.10+.12*Math.sin(t3);
    g.strokeStyle=c.col; g.lineWidth=1.6;
    g.beginPath(); g.arc(x,y,r*(1.7+Math.sin(t3)*.07),0,Math.PI*2); g.stroke();
    g.globalAlpha=1;
  }
  if(!hasLeft){
    g.globalAlpha=.16; g.strokeStyle='#50c060'; g.lineWidth=1.2;
    g.beginPath(); g.arc(x,y,r*1.5,0,Math.PI*2); g.stroke();
    g.globalAlpha=1;
  }
  // Disc
  const bg=g.createRadialGradient(x-r*.2,y-r*.2,0,x,y,r);
  bg.addColorStop(0,(_pressed===c.id?c.col+'88':c.dark+'55'));
  bg.addColorStop(1,'rgba(3,10,24,.6)');
  g.fillStyle=bg; g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
  if(_pressed===c.id){
    g.strokeStyle=c.col; g.lineWidth=2; g.globalAlpha=.7;
    g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.stroke();
    g.globalAlpha=1;
  }
  // Emoji
  const EMOJIS={boy:'👦',opshop:'🛍️',tall:'🌿',wise:'🤲',moon:'🌕'};
  if(c.id==='moon'){
    // Moon is drawn separately
    return;
  }
  const em=EMOJIS[c.id]||'✦';
  g.font=`${r*1.22}px serif`; g.textAlign='center'; g.textBaseline='middle';
  if(c.id==='dj') return; // DJ drawn as full portrait
  g.fillText(em,x,y);
  // Name
  const lfs=Math.max(8,Math.min(W,H)*.016);
  g.font=`${lfs}px 'Cormorant Garamond',serif`;
  g.fillStyle=hasLeft?c.col+'cc':'#307038aa';
  g.textAlign='center'; g.textBaseline='top';
  g.fillText(PORT?c.short:c.label,x,y+r*1.3);
  // Badge
  if(hasLeft){
    const lft=c.items.filter(id=>!inventory.includes(id)).length;
    const bx=x+r*.82,by=y-r*.82,br=r*.32;
    g.fillStyle=c.col; g.globalAlpha=.88;
    g.beginPath(); g.arc(bx,by,br,0,Math.PI*2); g.fill();
    g.globalAlpha=1;
    g.font=`bold ${br*1.6}px sans-serif`;
    g.fillStyle='#fff'; g.textAlign='center'; g.textBaseline='middle';
    g.fillText(lft,bx,by);
  }
}

  wh.addColorStop(0,'#e8e8e8'); wh.addColorStop(1,'#c0c0c4');
  g.fillStyle=wh;
  g.beginPath(); g.moveTo(-12*rs,4*rs); g.quadraticCurveTo(-14*rs,-8*rs,-7*rs,-16*rs); g.quadraticCurveTo(0,-20*rs,8*rs,-16*rs); g.quadraticCurveTo(14*rs,-8*rs,12*rs,4*rs); g.quadraticCurveTo(0,2*rs,-12*rs,4*rs); g.closePath(); g.fill();
  // Dark brows
  g.fillStyle='#3a2a18';
  g.beginPath(); g.ellipse(-5*rs,-5*rs,4*rs,1.3*rs,.1,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(5*rs,-5*rs,4*rs,1.3*rs,-.1,0,Math.PI*2); g.fill();
  // Eyes
  g.fillStyle='#3a2a18';

  g.beginPath(); g.arc(5*rs,-1*rs,1.8*rs,0,Math.PI*2); g.fill();

  const aSwing=PL.walk?Math.sin(PL.bobT)*.35:0;
  g.strokeStyle='#c8956a'; g.lineWidth=3.5*rs; g.lineCap='round';
  g.beginPath(); g.moveTo(-10*rs,4*rs); g.lineTo(-14*rs+aSwing*6*rs,20*rs+Math.cos(PL.bobT)*2*rs); g.stroke();
  g.beginPath(); g.moveTo(10*rs,4*rs); g.lineTo(14*rs-aSwing*6*rs,20*rs-Math.cos(PL.bobT)*2*rs); g.stroke();
  // Legs
  g.strokeStyle='#1e2038'; g.lineWidth=4*rs;
  const ls=PL.walk?Math.sin(PL.bobT):.0;
  g.beginPath(); g.moveTo(-4*rs,35*rs); g.lineTo(-5*rs+ls*5*rs,50*rs); g.stroke();
  g.beginPath(); g.moveTo(4*rs,35*rs); g.lineTo(5*rs-ls*5*rs,50*rs); g.stroke();

  g.fillStyle='#e8a010';

  if(PL.walk&&Math.random()<.1){

function drawFireflies(){
  if(Math.random()<.028){
    fireflies.push({x:Math.random()*W,y:H*.25+Math.random()*H*.5,vx:(Math.random()-.5)*.5,vy:-Math.random()*.28-.06,l:1,d:.002+Math.random()*.004,r:.8+Math.random()*1.8});
  }
  fireflies=fireflies.filter(f=>f.l>0);
  fireflies.forEach(f=>{
    f.x+=f.vx; f.y+=f.vy; f.l-=f.d;
    const fg=g.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*2.8);
    fg.addColorStop(0,'rgba(145,240,80,.9)'); fg.addColorStop(1,'rgba(100,200,50,0)');
    g.globalAlpha=f.l*.48; g.fillStyle=fg;
    g.beginPath(); g.arc(f.x,f.y,f.r*2.8,0,Math.PI*2); g.fill();

}

/* ── MINIMAP ──────────────────────────── */
function drawMinimap(){
  const mx=76,my=76;

  mm.fillStyle='rgba(1,5,14,.0)'; mm.fillRect(0,0,mx,my);

  });

/* ═══════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════ */
function loop(ts){
  T=ts/1000;
  g.clearRect(0,0,W,H);
  drawSky(); drawStars(); drawMoon();
  drawLandscape(); drawRiver(); drawWillow();
  CHARS.forEach(c=>drawCharSprite(c));
  drawFairy(); drawDJ();
  drawPlayer(); drawFireflies();
  updatePlayer();
  drawMinimap();
  requestAnimationFrame(loop);
}

function updatePlayer(){
  const tx=PL.tx*W,ty=PL.ty*H;
  const cx2=PL.x*W,cy2=PL.y*H;
  const dx=tx-cx2,dy=ty-cy2;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>4){
    const spd=Math.min(dist*.065,6.5);
    PL.x+=(dx/dist)*spd/W; PL.y+=(dy/dist)*spd/H;
    PL.walk=true; PL.face=dx>0?1:-1;
  } else { PL.walk=false; }
}

requestAnimationFrame(loop);

   INPUT
═══════════════════════════════════════════ */
function getXY(e){ return e.changedTouches?[e.changedTouches[0].clientX,e.changedTouches[0].clientY]:[e.clientX,e.clientY]; }
function charAt(px,py){
  const hr=Math.min(W,H)*(PORT?.072:.058);
  let best=null,bd=Infinity;
  CHARS.forEach(c=>{ const p=POS[c.id]; if(!p) return; const dx=px-p.x,dy=py-p.y,d=Math.sqrt(dx*dx+dy*dy); if(d<hr*1.6&&d<bd){bd=d;best=c;} });
  return best;
}
gc.addEventListener('touchstart',e=>{if(storyOpen||cardOpen||invOpen)return;e.preventDefault();const[px,py]=getXY(e);const c=charAt(px,py);_pressed=c?c.id:null;},{passive:false});
gc.addEventListener('touchend',e=>{if(storyOpen||cardOpen||invOpen)return;e.preventDefault();const[px,py]=getXY(e);const c=charAt(px,py);if(c&&c.id===_pressed)tapChar(c);else tapGround(px,py);_pressed=null;document.getElementById('taphint').style.display='none';},{passive:false});
gc.addEventListener('click',e=>{if(storyOpen||cardOpen||invOpen)return;const[px,py]=getXY(e);const c=charAt(px,py);if(c)tapChar(c);else tapGround(px,py);document.getElementById('taphint').style.display='none';});

function tapGround(px,py){
  const gy=PORT?H*.62:H*.66;
  if(py<gy*.82)return;
  PL.tx=px/W; PL.ty=Math.min(py/H,.9);
}
function tapChar(c){
  PL.tx=POS[c.id].x/W; PL.ty=POS[c.id].y/H;
  setTimeout(()=>openVN(c),280);
}

/* ═══════════════════════════════════════════
   VISUAL NOVEL ENGINE
═══════════════════════════════════════════ */
let currentGiver=null;

function openVN(c){
  const nextId=c.items.find(id=>!inventory.includes(id));
  if(!nextId){
    vnPages=[{who:c.label,txt:'You\'ve received everything I had for you.'},{who:c.label,txt:'My hands are empty now. But warmer.'}];
    vnItem=null; vnChar=c;
  } else {
    const item=ITEMS.find(i=>i.id===nextId);
    vnPages=[...item.pages,{who:'hidden',txt:item.hidden,meaning:item.meaning,isHidden:true}];
    vnItem=item; vnChar=c;
  }
  currentGiver=c.id;
  vnIdx=0;
  // Setup portrait canvas
  setTimeout(()=>{
    VW=vpc.offsetWidth||W; VH=vpc.offsetHeight||(H*.5);
    vpc.width=VW*dpr; vpc.height=VH*dpr;
    vp.setTransform(dpr,0,0,dpr,0,0);
    drawPortrait(c.id);
  },30);
  // Floating item
  const fi=document.getElementById('vn-float-icon');
  fi.textContent=vnItem?vnItem.e:''; fi.style.display=vnItem?'block':'none';
  document.getElementById('vn-hmsg').classList.remove('show');
  buildVNDots();
  document.getElementById('vn').classList.add('open');
  storyOpen=true;
  showVNPage(0);
}

function drawPortrait(giver){
  if(!VW||!VH) return;
  const th=THEMES[giver]||THEMES.boy;
  // Background
  const bg=vp.createLinearGradient(0,0,0,VH);
  bg.addColorStop(0,th.bg[0]); bg.addColorStop(.55,th.bg[1]); bg.addColorStop(1,th.bg[2]);
  vp.fillStyle=bg; vp.fillRect(0,0,VW,VH);
  // Stars
  for(let i=0;i<28;i++){
    const sx=(i*139)%VW,sy=(i*97)%VH*.65;
    vp.globalAlpha=.08+Math.random()*.15; vp.fillStyle='#fff';
    vp.beginPath(); vp.arc(sx,sy,.4+Math.random()*1.1,0,Math.PI*2); vp.fill();
  }
  vp.globalAlpha=1;
  // Accent glow
  const ag=vp.createRadialGradient(VW*.5,VH*.42,0,VW*.5,VH*.42,VW*.5);
  ag.addColorStop(0,th.acc+'28'); ag.addColorStop(1,'rgba(0,0,0,0)');
  vp.fillStyle=ag; vp.fillRect(0,0,VW,VH);
  // Large character emoji as atmosphere
  vp.font=`${Math.min(VW,VH)*.34}px serif`; vp.textAlign='center'; vp.textBaseline='middle';
  vp.globalAlpha=.22; vp.fillText(th.em,VW*.5,VH*.42); vp.globalAlpha=1;
  // Decorative rings
  vp.strokeStyle=th.acc+'28'; vp.lineWidth=1;
  [1.1,1.55,2.0].forEach(rm=>{vp.beginPath();vp.arc(VW*.5,VH*.42,Math.min(VW,VH)*rm*.17,0,Math.PI*2);vp.stroke();});
  // Bottom fade
  const fade=vp.createLinearGradient(0,VH*.55,0,VH);
  fade.addColorStop(0,'rgba(1,5,14,0)'); fade.addColorStop(1,'rgba(1,5,14,.9)');
  vp.fillStyle=fade; vp.fillRect(0,VH*.55,VW,VH*.45);
}

function buildVNDots(){
  const wrap=document.getElementById('vn-dots');
  wrap.innerHTML=vnPages.map((_,i)=>`<div class="vdot" id="vd${i}"></div>`).join('');
}
function refreshDots(){
  vnPages.forEach((_,i)=>{const d=document.getElementById('vd'+i);if(d)d.className='vdot'+(i<vnIdx?' done':i===vnIdx?' active':'');});
}

function showVNPage(idx){
  const pg=vnPages[idx]; if(!pg) return;
  document.getElementById('vn-speaker').textContent=pg.isHidden?'✦ HIDDEN MESSAGE':pg.who;
  document.getElementById('vn-hmsg').classList.remove('show');
  refreshDots();
  if(pg.isHidden){
    document.getElementById('vn-htext').textContent='"'+pg.txt+'"';
    document.getElementById('vn-hmean').textContent=pg.meaning||'';
    document.getElementById('vn-hmsg').classList.add('show');
    typeText('',true);
  } else {
    typeText(pg.txt);
  }
  document.getElementById('vn-btn').textContent=idx>=vnPages.length-1?(vnItem?'Collect ✦':'Close'):'Continue →';
}

function typeText(txt,skip=false){
  clearTimeout(vnTimer); vnTyping=true; vnShown=0;
  const el=document.getElementById('vn-txt');
  el.textContent='';
  if(skip){el.textContent=txt;vnTyping=false;return;}
  function tick(){
    if(vnShown>=txt.length){vnTyping=false;return;}
    el.textContent=txt.slice(0,++vnShown);
    const delay='.!?'.includes(txt[vnShown-1])?85:26;
    vnTimer=setTimeout(tick,delay);
  }
  tick();
}

function vnAdvance(){
  if(vnTyping){
    clearTimeout(vnTimer); vnTyping=false;
    document.getElementById('vn-txt').textContent=vnPages[vnIdx]?.txt||'';
    return;
  }
  if(vnIdx>=vnPages.length-1){
    if(vnItem) doCollect(vnItem);
    closeVN(); return;
  }
  vnIdx++; showVNPage(vnIdx);
}

function closeVN(){
  document.getElementById('vn').classList.remove('open');
  storyOpen=false; vnItem=null;
}

/* ═══════════════════════════════════════════
   COLLECT + CHAPTER
═══════════════════════════════════════════ */
function doCollect(item){
  inventory.push(item.id);
  unlocked.push(item.unlocks);
  if(item.id==='computer'&&inventory.includes('key')) unlocked.push('Final Hidden Message: "I\'m not going anywhere."');
  if(item.id==='fairysparkle') doSparkles();
  document.getElementById('hud-ct').textContent=inventory.length+' / 21';
  checkChapter();
}
function checkChapter(){
  if(chapIdx>=CHAPTERS.length-1) return;
  const nx=CHAPTERS[chapIdx+1];
  if(!nx.req||inventory.includes(nx.req)){ chapIdx++; document.getElementById('hud-cname').textContent=CHAPTERS[chapIdx].name; showChapterCard(CHAPTERS[chapIdx]); }
}

/* ═══════════════════════════════════════════
   CHAPTER CARD
═══════════════════════════════════════════ */
const ROMANS=['I','II','III','IV','V','VI','VII','VIII'];
function showChapterCard(ch){
  document.getElementById('cc-icon').textContent=ch.icon;
  document.getElementById('cc-roman').textContent='Chapter '+ROMANS[ch.n-1];
  document.getElementById('cc-name').textContent=ch.name;
  document.getElementById('cc-sub').textContent=ch.sub;
  const card=document.getElementById('chapter-card');
  card.classList.add('show'); cardOpen=true;
  card.onclick=()=>{card.classList.remove('show');cardOpen=false;};
}

/* ═══════════════════════════════════════════
   INVENTORY
═══════════════════════════════════════════ */
function openInv(){
  const body=document.getElementById('inv-body');
  if(!inventory.length){
    body.innerHTML='<div class="inv-empty">Nothing collected yet.<br><br>Walk up to the glowing characters and tap them to discover what they\'re holding for you.</div>';
  } else {
    const givers=[
      {k:'boy',   l:'From The Little Boy'},
      {k:'opshop',l:'From The Op-Shop Woman'},
      {k:'tall',  l:'From The Tall Woman'},
      {k:'wise',  l:'From The Nine-Finger Wise Woman'},
      {k:'dj',    l:'From DJ Daddy Cool'},
      {k:'willow',l:'From The Willow Tree'},
      {k:'moon',  l:'From The Moon'},
      {k:'fairy', l:'From The Fairy'},
    ];
    let html='';
    givers.forEach(gv=>{
      const its=inventory.map(id=>ITEMS.find(i=>i.id===id)).filter(i=>i&&i.giver===gv.k);
      if(!its.length) return;
      html+=`<div class="inv-sec">${gv.l}</div>`;
      its.forEach(it=>{
        html+=`<div class="icard" onclick="examineItem('${it.id}')">
          <div class="ic-em">${it.e}</div>
          <div>
            <div class="ic-name">${it.name}</div>
            <div class="ic-from">Tap to examine</div>
            <div class="ic-unlocks">↳ Unlocks: ${it.unlocks}</div>
          </div>
        </div>`;
      });
    });
    if(unlocked.length){
      html+=`<div id="inv-scenes"><h3>Scenes Unlocked</h3><div>${unlocked.map(e=>`<span class="epill">↳ ${e}</span>`).join('')}</div></div>`;
    }
    body.innerHTML=html;
  }
  document.getElementById('inv').classList.add('open'); invOpen=true;
}
function closeInv(){ document.getElementById('inv').classList.remove('open'); invOpen=false; }

/* ═══════════════════════════════════════════
   EXAMINE ITEM
═══════════════════════════════════════════ */
function examineItem(id){
  const it=ITEMS.find(i=>i.id===id); if(!it) return;
  document.getElementById('ex-em').textContent=it.e;
  document.getElementById('ex-name').textContent=it.name;
  document.getElementById('ex-from').textContent='from '+it.from;
  document.getElementById('ex-meaning').textContent=it.meaning;
  document.getElementById('ex-hidden').textContent='✦ "'+it.hidden+'"';
  document.getElementById('examine').classList.add('open');
}
function closeExamine(){ document.getElementById('examine').classList.remove('open'); }

/* ═══════════════════════════════════════════
   SPARKLES
═══════════════════════════════════════════ */
function doSparkles(){
  const gs=['✨','⭐','💫','🌟','·','✦','★'];
  for(let i=0;i<22;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='sp';
      const sz=.65+Math.random()*.9;
      el.style.cssText=`left:${5+Math.random()*84}%;top:${7+Math.random()*70}%;font-size:${sz}rem;animation-delay:${Math.random()*.5}s`;
      el.textContent=gs[Math.floor(Math.random()*gs.length)];
      document.body.appendChild(el); setTimeout(()=>el.remove(),2000);
    },i*55);
  }
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
PL.x=.5; PL.y=PORT?.70:.68; PL.tx=PL.x; PL.ty=PL.y;
setTimeout(()=>showChapterCard(CHAPTERS[0]),900);
