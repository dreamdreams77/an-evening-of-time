<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>An Evening of Time</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#020810;
  font-family:'Cormorant Garamond',Georgia,serif;color:#e8e0cc;
  -webkit-tap-highlight-color:transparent;touch-action:none}

/* ── CANVAS ─────────────────────── */
#gc{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── SCREEN TRANSITION ──────────── */
#curtain{position:fixed;inset:0;background:#020810;z-index:200;
  pointer-events:none;opacity:0;transition:opacity .6s}
#curtain.in{opacity:1;pointer-events:all}

/* ── CHAPTER TITLE CARD ─────────── */
#chapter-card{
  position:fixed;inset:0;z-index:180;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(2,8,16,.92);backdrop-filter:blur(12px);
  pointer-events:none;opacity:0;transition:opacity .5s;
}
#chapter-card.show{opacity:1;pointer-events:all}
#cc-eye{font-size:2.4rem;margin-bottom:16px;opacity:.7}
#cc-num{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.3em;
  text-transform:uppercase;color:#4a7aaa;margin-bottom:10px}
#cc-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:600;
  color:#c8b070;text-align:center;margin-bottom:12px;line-height:1.3}
#cc-line{width:60px;height:1px;background:rgba(200,176,112,.3);margin-bottom:14px}
#cc-sub{font-size:.9rem;color:#8090a0;font-style:italic;text-align:center;
  max-width:280px;line-height:1.6}
#cc-tap{margin-top:28px;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
  color:#3a5a78;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.9}}

/* ── HUD ────────────────────────── */
#hud{position:fixed;top:0;left:0;right:0;z-index:30;
  background:linear-gradient(180deg,rgba(2,8,16,.88) 0%,transparent 100%);
  padding:10px 16px 22px;display:flex;justify-content:space-between;
  align-items:center;pointer-events:none}
#hud-chapter{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.16em;
  text-transform:uppercase;color:#3a6a98}
#hud-chapter em{color:#c8b070;font-style:italic;font-family:'Cormorant Garamond',serif}
#hud-count{font-size:.62rem;color:#2a4a68;letter-spacing:.05em}

/* ── COLLECTION BTN ─────────────── */
#inv-btn{position:fixed;top:9px;right:14px;z-index:40;
  background:rgba(4,14,30,.9);border:1px solid rgba(100,160,220,.2);
  border-radius:20px;padding:8px 16px;color:#6090b8;
  font-size:.7rem;font-family:'Cinzel',serif;cursor:pointer;
  letter-spacing:.08em;transition:all .2s}
#inv-btn:hover,#inv-btn:active{border-color:rgba(200,176,112,.4);color:#c8b070}

/* ── STORY SCENE (Visual Novel) ─── */
#vn-scene{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
#vn-scene.open{opacity:1;pointer-events:all}

/* Portrait art area */
#vn-art{
  flex:1;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#050f1e 0%,#07142a 60%,#0a1c14 100%);
}
#vn-portrait-canvas{position:absolute;inset:0;width:100%;height:100%}
#vn-item-display{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:30px;
  background:linear-gradient(0deg,rgba(5,12,24,.8) 0%,transparent 60%);
}
#vn-item-icon{font-size:3.8rem;filter:drop-shadow(0 0 20px rgba(200,176,112,.6));
  display:none;animation:itemFloat 3s ease-in-out infinite}
@keyframes itemFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Dialogue box */
#vn-box{
  flex-shrink:0;
  background:linear-gradient(0deg,rgba(2,7,18,.97) 0%,rgba(3,10,24,.95) 100%);
  border-top:1px solid rgba(100,160,220,.12);
  padding:18px 20px 16px;min-height:200px;
  display:flex;flex-direction:column;
}
#vn-speaker{
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;
  text-transform:uppercase;color:#c8b070;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
#vn-speaker-dot{width:6px;height:6px;border-radius:50%;
  background:#c8b070;box-shadow:0 0 8px #c8b08050;flex-shrink:0}
#vn-text{font-size:1rem;line-height:1.82;color:#d8d0b8;
  flex:1;min-height:80px;position:relative}
#vn-cursor{display:inline-block;width:2px;height:1em;background:#c8b070;
  margin-left:2px;vertical-align:text-bottom;animation:blink .8s step-end infinite}

/* Hidden message reveal */
#vn-hidden{
  margin-top:14px;padding:12px 16px;
  background:linear-gradient(135deg,rgba(50,34,4,.7),rgba(30,20,4,.7));
  border:1px solid rgba(200,168,48,.25);border-radius:6px;
  font-style:italic;font-size:.88rem;color:#e8c850;
  display:none;animation:hiddenReveal .8s ease;
}
#vn-hidden.show{display:block}
@keyframes hiddenReveal{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#vn-hidden-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.2em;
  color:#8a7030;text-transform:uppercase;margin-bottom:5px}
#vn-hidden-msg{font-size:.92rem;line-height:1.5}

/* VN nav */
#vn-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
#vn-progress-dots{display:flex;gap:5px}
.vn-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s}
.vn-dot.active{background:#c8b070;box-shadow:0 0 6px #c8b07060}
.vn-dot.done{background:rgba(200,176,112,.35)}
#vn-next{background:rgba(100,160,220,.1);border:1px solid rgba(100,160,220,.2);
  border-radius:18px;padding:8px 20px;color:#7aace0;
  font-size:.75rem;font-family:'Cinzel',serif;cursor:pointer;
  letter-spacing:.08em;transition:all .2s}
#vn-next:hover,#vn-next:active{background:rgba(200,176,112,.15);border-color:rgba(200,176,112,.3);color:#c8b070}

/* ── INVENTORY ───────────────────── */
#inv-overlay{position:fixed;inset:0;z-index:150;background:rgba(2,7,16,.97);
  display:none;flex-direction:column;overflow:hidden}
#inv-overlay.open{display:flex}
#inv-top{flex-shrink:0;padding:18px 18px 14px;
  border-bottom:1px solid rgba(100,160,220,.1);
  display:flex;justify-content:space-between;align-items:center}
#inv-top h2{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.18em;
  text-transform:uppercase;color:#c8b070}
#inv-close-btn{background:transparent;border:1px solid rgba(255,255,255,.1);
  border-radius:6px;color:#4a7090;padding:7px 16px;
  font-family:'Cinzel',serif;font-size:.68rem;cursor:pointer;letter-spacing:.06em}
#inv-scroll{flex:1;overflow-y:auto;padding:16px 18px}
.inv-section-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;color:#2a4a68;margin:16px 0 8px;
  padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.05)}
.inv-section-label:first-child{margin-top:0}

/* Item examine card */
.icard{display:flex;gap:14px;padding:14px;margin-bottom:8px;
  background:rgba(255,255,255,.03);border-radius:10px;
  border:1px solid rgba(255,255,255,.06);cursor:pointer;
  transition:all .2s}
.icard:hover,.icard:active{background:rgba(200,176,112,.05);border-color:rgba(200,176,112,.15)}
.icard.expanded{background:rgba(50,34,4,.3);border-color:rgba(200,176,112,.2)}
.ic-icon{font-size:1.8rem;flex-shrink:0;padding-top:3px}
.ic-name{color:#f0e4c0;font-size:.9rem;font-weight:600;margin-bottom:1px}
.ic-from{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;
  text-transform:uppercase;color:#3a6888;margin-bottom:0}
.ic-body{display:none;margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,.06)}
.icard.expanded .ic-body{display:block}
.ic-meaning{color:#9890808;font-size:.82rem;line-height:1.58;margin-bottom:8px;color:#988070}
.ic-msg{color:#c8a030;font-size:.82rem;font-style:italic}
.ic-unlocks{font-size:.7rem;color:#3a6040;margin-top:6px;
  font-family:'Cinzel',serif;letter-spacing:.06em}

#inv-events-section{margin-top:20px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.06)}
#inv-events-section h3{font-family:'Cinzel',serif;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:#2a4862;margin-bottom:10px}
.epill{display:inline-block;padding:4px 12px;background:rgba(20,50,90,.4);
  border-radius:12px;font-size:.7rem;color:#6898c0;margin:3px}
.inv-empty{color:#2a4a68;font-style:italic;font-size:.88rem;
  padding:24px 0;text-align:center;line-height:1.7}

/* ── EXAMINE OVERLAY ────────────── */
#examine{position:fixed;inset:0;z-index:160;background:rgba(2,7,16,.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px}
#examine.open{display:flex}
#ex-icon{font-size:4rem;margin-bottom:18px;
  filter:drop-shadow(0 0 28px rgba(200,176,112,.5));
  animation:itemFloat 3s ease-in-out infinite}
#ex-name{font-family:'Cinzel',serif;font-size:1.1rem;color:#c8b070;
  letter-spacing:.12em;text-align:center;margin-bottom:4px}
#ex-from{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;
  text-transform:uppercase;color:#3a6888;margin-bottom:18px;text-align:center}
#ex-line{width:50px;height:1px;background:rgba(200,176,112,.25);margin:0 auto 18px}
#ex-meaning{font-size:.95rem;line-height:1.72;color:#b0a890;text-align:center;margin-bottom:18px;max-width:320px}
#ex-hidden{font-style:italic;font-size:.95rem;color:#e8c850;text-align:center;
  padding:12px 18px;background:rgba(50,34,4,.5);border:1px solid rgba(200,168,48,.2);
  border-radius:8px;max-width:320px;margin-bottom:24px;line-height:1.6}
#ex-close{background:transparent;border:1px solid rgba(255,255,255,.12);
  border-radius:20px;color:#4a7090;padding:10px 28px;
  font-family:'Cinzel',serif;font-size:.7rem;cursor:pointer;letter-spacing:.1em}

/* ── SPARKLES ───────────────────── */
.sp{position:fixed;pointer-events:none;z-index:99;animation:spUp 1.4s ease forwards}
@keyframes spUp{0%{opacity:1;transform:scale(1) translateY(0) rotate(0)}
  100%{opacity:0;transform:scale(.1) translateY(-100px) rotate(600deg)}}

/* ── TAP LABEL ──────────────────── */
#tap-label{position:fixed;bottom:24px;left:0;right:0;text-align:center;
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.16em;
  text-transform:uppercase;color:#1a3050;pointer-events:none;z-index:5;
  animation:blink 2.5s ease-in-out infinite}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<!-- Curtain for transitions -->
<div id="curtain"></div>

<!-- Chapter title card -->
<div id="chapter-card">
  <div id="cc-eye">🌙</div>
  <div id="cc-num" id="cc-num">Chapter I</div>
  <div id="cc-title">Moonlit Arrival</div>
  <div id="cc-line"></div>
  <div id="cc-sub"></div>
  <div id="cc-tap">Tap to begin</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-chapter">Chapter: <em id="hud-cname">Moonlit Arrival</em></div>
  <div id="hud-count">0 / 21</div>
</div>
<button id="inv-btn" onclick="openInv()">✦ Collection</button>

<!-- Visual Novel Scene -->
<div id="vn-scene">
  <div id="vn-art">
    <canvas id="vn-portrait-canvas"></canvas>
    <div id="vn-item-display">
      <div id="vn-item-icon"></div>
    </div>
  </div>
  <div id="vn-box">
    <div id="vn-speaker"><div id="vn-speaker-dot"></div><span id="vn-speaker-name"></span></div>
    <div id="vn-text"><span id="vn-words"></span><span id="vn-cursor"></span></div>
    <div id="vn-hidden">
      <div id="vn-hidden-label">✦ Hidden Message</div>
      <div id="vn-hidden-msg"></div>
    </div>
    <div id="vn-nav">
      <div id="vn-progress-dots"></div>
      <button id="vn-next" onclick="vnNext()">Continue →</button>
    </div>
  </div>
</div>

<!-- Inventory -->
<div id="inv-overlay">
  <div id="inv-top">
    <h2>✦ DJ Daddy Cool's Collection</h2>
    <button id="inv-close-btn" onclick="closeInv()">✕ Close</button>
  </div>
  <div id="inv-scroll" id="inv-scroll"></div>
</div>

<!-- Item examine -->
<div id="examine">
  <div id="ex-icon"></div>
  <div id="ex-name"></div>
  <div id="ex-from"></div>
  <div id="ex-line"></div>
  <div id="ex-meaning"></div>
  <div id="ex-hidden"></div>
  <button id="ex-close" onclick="closeExamine()">← Back to Collection</button>
</div>

<div id="tap-label">Tap a character to approach</div>

<script>
'use strict';
// ════════════════════════════════════════
//  CANVAS + RESIZE
// ════════════════════════════════════════
const gc = document.getElementById('gc');
const gx = gc.getContext('2d');
let W=0, H=0, dpr=1, portrait=false;

const vpc = document.getElementById('vn-portrait-canvas');
const vpx = vpc.getContext('2d');
let VW=0, VH=0;

function resize(){
  dpr = Math.min(window.devicePixelRatio||1,2);
  W = window.innerWidth; H = window.innerHeight;
  portrait = H > W;
  gc.width=W*dpr; gc.height=H*dpr;
  gx.setTransform(dpr,0,0,dpr,0,0);
  VW = vpc.offsetWidth; VH = vpc.offsetHeight;
  vpc.width=VW*dpr; vpc.height=VH*dpr;
  vpx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

// ════════════════════════════════════════
//  ITEM DATA  (all 21, correct attributions)
// ════════════════════════════════════════
const ITEMS = [
  {id:'feather',    emoji:'🪶', name:'Feather',         from:'The Little Boy',            giver:'boy',
   meaning:'Childhood softness, innocence — the part of you that still needs gentleness.',
   hidden:'You were always trying.',        unlocks:'River Memory',
   pages:[
     {speaker:'THE LITTLE BOY', text:'He holds it out without meeting your eyes.'},
     {speaker:'THE LITTLE BOY', text:'Like he\'s been keeping it safe. Until you were ready to carry it.'},
     {speaker:'DJ DADDY COOL',  text:'The feather is lighter than you remember being.'},
   ]},
  {id:'stone',      emoji:'🪨', name:'Stone',            from:'The Little Boy',            giver:'boy',
   meaning:'The weight you carried as a child — the heaviness you didn\'t have words for.',
   hidden:'You didn\'t deserve that weight.',  unlocks:'Time Loop',
   pages:[
     {speaker:'THE LITTLE BOY', text:'Both hands. He places it in yours slowly.'},
     {speaker:'THE LITTLE BOY', text:'Like he\'s been carrying this a long time. And finally found the right person.'},
     {speaker:'DJ DADDY COOL',  text:'The stone is heavier than it looks. You\'ve been carrying this longer than you knew.'},
   ]},
  {id:'calculator', emoji:'🧮', name:'Calculator',       from:'The Little Boy',            giver:'boy',
   meaning:'Logic, problem-solving — the way you tried to make sense of things too early.',
   hidden:'You didn\'t have to figure it all out alone.',  unlocks:'Calculator Puzzle',
   pages:[
     {speaker:'THE LITTLE BOY', text:'He hands it over shyly.'},
     {speaker:'THE LITTLE BOY', text:'All those numbers you punched in — trying to solve what couldn\'t be solved with numbers.'},
     {speaker:'DJ DADDY COOL',  text:'Some things can\'t be calculated. You know that now.'},
   ]},
  {id:'mcdonalds',  emoji:'🍟', name:"McDonald's Bag",   from:'The Little Boy',            giver:'boy',
   meaning:'Nostalgia, comfort food — childhood love arriving in ordinary forms.',
   hidden:'You were loved in small ways.',     unlocks:'Memory Cutscene',
   pages:[
     {speaker:'THE LITTLE BOY', text:'He grins and holds it out with both hands.'},
     {speaker:'THE LITTLE BOY', text:'The smell hits before anything else. You know exactly which Saturday morning this is.'},
     {speaker:'DJ DADDY COOL',  text:'Cold fries and warm feelings. Someone tried. That counts for everything.'},
   ]},
  {id:'pasta',      emoji:'🍝', name:'Pasta',             from:'The Little Boy',            giver:'boy',
   meaning:'Home, warmth — the simple things that kept you going.',
   hidden:'You were cared for.',               unlocks:'Kitchen Memory',
   pages:[
     {speaker:'THE LITTLE BOY', text:'He presents it solemnly. Like it\'s a treasure. Steam still rising.'},
     {speaker:'THE LITTLE BOY', text:'Someone made this for you.'},
     {speaker:'DJ DADDY COOL',  text:'A bowl. A kitchen. Someone who loved you the best way they knew.'},
   ]},
  {id:'ring',       emoji:'💍', name:'Ring',              from:'The Op-Shop Woman',         giver:'opshop',
   meaning:'A promise, a connection — a future possibility.',
   hidden:'Some things find you twice.',       unlocks:"Tall Woman's Corridor",
   pages:[
     {speaker:'THE OP-SHOP WOMAN', text:'She doesn\'t say where it came from.'},
     {speaker:'THE OP-SHOP WOMAN', text:'Presses it into your palm. Turns back to the shelf. It fits perfectly.'},
     {speaker:'DJ DADDY COOL',     text:'It was always going to be yours.'},
   ]},
  {id:'puffer',     emoji:'🧥', name:'Puffer Jacket',     from:'The Op-Shop Woman',         giver:'opshop',
   meaning:'Warmth, safety, comfort — the feeling of being held.',
   hidden:"You're allowed to be warm.",        unlocks:'Deep Forest',
   pages:[
     {speaker:'THE OP-SHOP WOMAN', text:'"Here."'},
     {speaker:'THE OP-SHOP WOMAN', text:'She doesn\'t explain. It smells like cedar and old kindness.'},
     {speaker:'DJ DADDY COOL',     text:'The forest won\'t frighten you now. You are held.'},
   ]},
  {id:'coffee',     emoji:'☕', name:'Chipped Mug',       from:'The Op-Shop Woman',         giver:'opshop',
   meaning:'Imperfection, real life — the beauty in things that aren\'t pristine.',
   hidden:"You don't have to be perfect to be loved.",  unlocks:'DJ Scene',
   pages:[
     {speaker:'THE OP-SHOP WOMAN', text:'You notice the chip first.'},
     {speaker:'THE OP-SHOP WOMAN', text:'"That\'s the best one," she says. She completely means it.'},
     {speaker:'DJ DADDY COOL',     text:'Chipped on one side. Still holds everything you need it to hold.'},
   ]},
  {id:'titanium',   emoji:'⭕', name:'Titanium Ring',     from:'The Op-Shop Woman',         giver:'opshop',
   meaning:'Strength, durability — the unbreakable parts of you.',
   hidden:"You're stronger than you think.",   unlocks:"Wise Woman's Blessing",
   pages:[
     {speaker:'THE OP-SHOP WOMAN', text:'It was on a shelf you almost didn\'t look at.'},
     {speaker:'THE OP-SHOP WOMAN', text:'She nods when you pick it up. "That one\'s been waiting."'},
     {speaker:'DJ DADDY COOL',     text:'Titanium doesn\'t bend. Neither do the deepest parts of you.'},
   ]},
  {id:'soju',       emoji:'🍶', name:'Soju',              from:'The Op-Shop Woman',         giver:'opshop',
   meaning:'Release, honesty — the moments where walls come down.',
   hidden:'You can tell the truth here.',      unlocks:'Late-Night Dialogue',
   pages:[
     {speaker:'THE OP-SHOP WOMAN', text:'She wasn\'t supposed to have this in the back room.'},
     {speaker:'THE OP-SHOP WOMAN', text:'Neither were you. Perfect.'},
     {speaker:'DJ DADDY COOL',     text:'Walls come down slowly. Then all at once. You say something true.'},
   ]},
  {id:'sofa',       emoji:'🛋️', name:'Sofa',              from:'The Op-Shop Woman',         giver:'opshop',
   meaning:'Rest, softness — the place where you finally let yourself collapse.',
   hidden:'You deserve rest.',                  unlocks:'Cozy Hidden Scene',
   pages:[
     {speaker:'THE OP-SHOP WOMAN', text:'"Sit down for a minute."'},
     {speaker:'THE OP-SHOP WOMAN', text:'You didn\'t know how tired you were until you did.'},
     {speaker:'DJ DADDY COOL',     text:'Your whole body exhales. You didn\'t know you needed this.'},
   ]},
  {id:'metamucil',  emoji:'🧃', name:'Metamucil',         from:'The Tall Woman',            giver:'tall',
   meaning:'Humor, grounding — the silly parts of life that keep you human.',
   hidden:'Not everything has to be serious.',  unlocks:"Fairy's Message",
   pages:[
     {speaker:'THE TALL WOMAN', text:'She produces it with complete seriousness.'},
     {speaker:'THE TALL WOMAN', text:'Then catches your eye. You both lose it entirely.'},
     {speaker:'DJ DADDY COOL',  text:'You laugh for longer than is necessary. It feels incredible.'},
   ]},
  {id:'notebook',   emoji:'📓', name:'Notebook',           from:'The Tall Woman',            giver:'tall',
   meaning:'Future plans, dreams — the things you\'re scared to write down.',
   hidden:"You're allowed to want things.",     unlocks:'Willow Dialogue',
   pages:[
     {speaker:'THE TALL WOMAN', text:'She holds it out like she already knows what you\'ll write.'},
     {speaker:'THE TALL WOMAN', text:'"It doesn\'t bite," she says.'},
     {speaker:'DJ DADDY COOL',  text:'Open it near the willow. The pages glow faintly with things you haven\'t said yet.'},
   ]},
  {id:'vitamins',   emoji:'💊', name:'Vitamins',           from:'The Tall Woman',            giver:'tall',
   meaning:'Care, maintenance — the small things that keep you going.',
   hidden:"You're worth taking care of.",       unlocks:'Time Loop Energy',
   pages:[
     {speaker:'THE TALL WOMAN', text:'She presses the bottle into your hands.'},
     {speaker:'THE TALL WOMAN', text:'Like it\'s medicine for something deeper than a body.'},
     {speaker:'DJ DADDY COOL',  text:'Take one every morning. Keep going. You\'re worth the effort.'},
   ]},
  {id:'tv',         emoji:'📺', name:'TV',                 from:'The Tall Woman',            giver:'tall',
   meaning:'Reflection, distraction — the stories you tell yourself.',
   hidden:'Look closer.',                       unlocks:'Time Loop Vision',
   pages:[

function makeStars(){
  const skyH = portrait ? .45 : .50;
  stars = Array.from({length:100},()=>({
    px:Math.random(), py:Math.random()*skyH,
    r:.3+Math.random()*1.5, ph:Math.random()*Math.PI*2,
    sp:.4+Math.random()*1.3, warm:Math.random()<.12
  }));
}

// Resolved pixel positions
const POS={};
function resolvePos(){
  CHARS.forEach(c=>{
    let vx=c.vx, vy=c.vy;
    if(portrait){
      vy = c.vy*.74+.04;
    }
    POS[c.id]={x:vx*W, y:vy*H};
  });
  if(portrait){
    POS.moon  = {x:W*.84, y:H*.10};
    POS.fairy = {x:W*.18, y:H*.27};
  }
}

function drawSky(){
  // Deep night gradient
  const g=gx.createLinearGradient(0,0,0,H*.65);
  g.addColorStop(0,'#01050f');
  g.addColorStop(.35,'#060e24');
  g.addColorStop(.7,'#091828');
  g.addColorStop(1,'#0a1f1a');
  gx.fillStyle=g; gx.fillRect(0,0,W,H*.65);
  // Aurora wisps
  const t2=T*.18;
  for(let i=0;i<3;i++){
    const ax=W*(.2+i*.28+Math.sin(t2+i*2.1)*.06);
    const ay=H*(.08+i*.04+Math.cos(t2*1.3+i)*.03);
    const gA=gx.createRadialGradient(ax,ay,0,ax,ay,W*.18);
    const cols=['rgba(20,80,120,.04)','rgba(30,100,60,.03)','rgba(80,50,120,.03)'];
    gA.addColorStop(0,cols[i]); gA.addColorStop(1,'rgba(0,0,0,0)');
    gx.fillStyle=gA; gx.fillRect(0,0,W,H*.5);
  }
}

function drawStars(){
  stars.forEach(s=>{
    const a=.12+.78*(.5+.5*Math.sin(T*s.sp+s.ph));
    gx.globalAlpha=a;
    gx.fillStyle=s.warm?'#ffe090':'#e8e8ff';
    gx.beginPath(); gx.arc(s.px*W,s.py*H,s.r,0,Math.PI*2); gx.fill();
  });
  gx.globalAlpha=1;
  // Soft Milky Way band
  const mw=gx.createLinearGradient(W*.1,H*.05,W*.9,H*.38);
  mw.addColorStop(0,'rgba(180,200,255,0)');
  mw.addColorStop(.3,'rgba(180,200,255,.015)');
  mw.addColorStop(.5,'rgba(200,220,255,.022)');
  mw.addColorStop(.7,'rgba(180,200,255,.015)');
  mw.addColorStop(1,'rgba(180,200,255,0)');
  gx.fillStyle=mw; gx.fillRect(0,0,W,H*.5);
}

function drawMoon(){
  const mp=POS.moon; if(!mp) return;
  const mr=Math.min(W,H)*(portrait?.056:.062);
  const pulse=.5+.5*Math.sin(T*.6);
  // Outer halo
  const halos=inventory.includes('moonhalo')?1:.2;
  for(let layer=0;layer<3;layer++){
    const lr=mr*(2.2+layer*.6);
    gx.globalAlpha=(.04+pulse*.025)*halos*(3-layer)*.4;
    const hg=gx.createRadialGradient(mp.x,mp.y,mr*.9,mp.x,mp.y,lr);
    hg.addColorStop(0,'rgba(255,255,200,0)'); hg.addColorStop(1,'rgba(255,248,170,.8)');
    gx.fillStyle=hg; gx.beginPath(); gx.arc(mp.x,mp.y,lr,0,Math.PI*2); gx.fill();
  }
  gx.globalAlpha=1;
  // Glow bloom
  gx.globalAlpha=.20+pulse*.08;
  const bg=gx.createRadialGradient(mp.x,mp.y,0,mp.x,mp.y,mr*1.9);
  bg.addColorStop(0,'#fffde0'); bg.addColorStop(1,'rgba(240,220,80,0)');
  gx.fillStyle=bg; gx.beginPath(); gx.arc(mp.x,mp.y,mr*1.9,0,Math.PI*2); gx.fill();
  gx.globalAlpha=1;
  // Moon disc
  const mg=gx.createRadialGradient(mp.x-mr*.25,mp.y-mr*.25,0,mp.x,mp.y,mr);
  mg.addColorStop(0,'#fffef2'); mg.addColorStop(.5,'#f8eebc'); mg.addColorStop(1,'#d8c860');
  gx.fillStyle=mg; gx.beginPath(); gx.arc(mp.x,mp.y,mr,0,Math.PI*2); gx.fill();
  // Subtle surface texture
  gx.globalAlpha=.1;
  [[-.26,-.2,.14],[.2,.22,.09],[-.08,.3,.06]].forEach(([dx,dy,dr])=>{
    const cg=gx.createRadialGradient(mp.x+dx*mr*2,mp.y+dy*mr*2,0,mp.x+dx*mr*2,mp.y+dy*mr*2,dr*mr*2);
    cg.addColorStop(0,'rgba(150,120,20,.8)'); cg.addColorStop(1,'rgba(150,120,20,0)');
    gx.fillStyle=cg; gx.beginPath(); gx.arc(mp.x+dx*mr*2,mp.y+dy*mr*2,dr*mr*2,0,Math.PI*2); gx.fill();
  });
  gx.globalAlpha=1;
}

function drawLandscape(){
  // Far hills (desaturated, dark)
  [
    {cx:.15, cy:.72, rx:.24, ry:.10, col:'#06100a'},
    {cx:.50, cy:.74, rx:.32, ry:.08, col:'#050d07'},
    {cx:.82, cy:.71, rx:.26, ry:.10, col:'#06100a'},
  ].forEach(h=>{
    gx.fillStyle=h.col;
    gx.beginPath(); gx.ellipse(h.cx*W,(portrait?H*.68:H*.72)+h.cy*H*.03,h.rx*W,h.ry*H,0,0,Math.PI*2); gx.fill();
  });
  // Ground — layered
  const gy = portrait ? H*.62 : H*.66;
  const grg=gx.createLinearGradient(0,gy,0,H);
  grg.addColorStop(0,'#0d1e0e'); grg.addColorStop(.4,'#091408'); grg.addColorStop(1,'#030804');
  gx.fillStyle=grg; gx.fillRect(0,gy,W,H-gy);
  // Ground ambient — faint green glow from damp earth
  gx.globalAlpha=.06;
  const gg=gx.createLinearGradient(0,gy,0,gy+H*.12);
  gg.addColorStop(0,'#40a840'); gg.addColorStop(1,'rgba(40,100,40,0)');
  gx.fillStyle=gg; gx.fillRect(0,gy,W,H*.15);
  gx.globalAlpha=1;
  // Grass tufts
  gx.strokeStyle='#1a3c1a'; gx.lineWidth=1.5; gx.lineCap='round';
  for(let i=0;i<30;i++){
    const gx2=W*(.04+i*.032), gy2=gy+H*.01+Math.sin(i*1.7)*H*.008;
    const gh=H*(.012+Math.sin(i*2.3)*.006);
    const sw=Math.sin(T*.3+i*.5)*.02;
    gx.globalAlpha=.4+Math.sin(i*.8)*.15;
    gx.beginPath(); gx.moveTo(gx2,gy2); gx.quadraticCurveTo(gx2+sw*W,gy2-gh*.5,gx2+sw*W*.5,gy2-gh); gx.stroke();
  }
  gx.globalAlpha=1;
}

function drawRiver(){
  const ry = portrait ? H*.83 : H*.87;
  const rh=H*.1;
  // Water body
  const rwg=gx.createLinearGradient(0,ry,0,ry+rh);
  rwg.addColorStop(0,'#1a4878'); rwg.addColorStop(.5,'#103060'); rwg.addColorStop(1,'#061428');
  gx.fillStyle=rwg;
  gx.beginPath(); gx.ellipse(W*.5,ry+rh*.35,W*.58,rh*.65,0,0,Math.PI*2); gx.fill();
  // Moon reflection
  const rp=.5+.5*Math.sin(T*.7);
  gx.globalAlpha=(.05+rp*.04);
  const mr2=gx.createRadialGradient(W*.20,ry+rh*.3,0,W*.20,ry+rh*.3,W*.04);
  mr2.addColorStop(0,'#fffde0'); mr2.addColorStop(1,'rgba(255,253,200,0)');
  gx.fillStyle=mr2; gx.beginPath(); gx.arc(W*.20,ry+rh*.3,W*.04,0,Math.PI*2); gx.fill();
  gx.globalAlpha=1;
  // Shimmer
  [[.12,.02,.38,.03],[.44,-.01,.68,.01],[.62,.03,.86,.04]].forEach(([x1,d1,x2,d2],i)=>{
    gx.globalAlpha=.08+.14*Math.sin(T*.85+i*1.5);
    gx.strokeStyle='rgba(120,210,255,.95)'; gx.lineWidth=1.2;
    gx.beginPath(); gx.moveTo(x1*W,ry+d1*rh); gx.lineTo(x2*W,ry+d2*rh); gx.stroke();
  });
  gx.globalAlpha=1;
}

function drawWillow(){
  const wp=POS.willow; if(!wp) return;
  const wx=wp.x, wy=wp.y;
  const sway=Math.sin(T*.26)*.018;
  const sc=Math.min(W,H)/600;
  gx.save();
  gx.translate(wx,wy+90*sc); gx.rotate(sway); gx.translate(-wx,-(wy+90*sc));
  // Roots
  gx.strokeStyle='#0f0804'; gx.lineWidth=3*sc; gx.lineCap='round';
  [-.08,.08].forEach(d=>{
    gx.beginPath(); gx.moveTo(wx,wy+100*sc); gx.quadraticCurveTo(wx+d*80*sc,wy+105*sc,wx+d*120*sc,wy+108*sc); gx.stroke();
  });
  // Trunk
  gx.lineWidth=9*sc; gx.strokeStyle='#180c04';
  gx.beginPath(); gx.moveTo(wx,wy+100*sc);
  gx.bezierCurveTo(wx+6*sc,wy+60*sc,wx-4*sc,wy+28*sc,wx,wy); gx.stroke();
  // Inner trunk highlight
  gx.lineWidth=2*sc; gx.strokeStyle='rgba(80,50,20,.25)';
  gx.beginPath(); gx.moveTo(wx+2*sc,wy+90*sc); gx.bezierCurveTo(wx+5*sc,wy+55*sc,wx,wy+28*sc,wx+1*sc,wy+8*sc); gx.stroke();
  // Branch skeleton
  [[-30*sc,-20*sc,-55*sc,-10*sc],[30*sc,-18*sc,55*sc,-8*sc],[0,-8*sc,-18*sc,-30*sc],[0,-8*sc,18*sc,-30*sc]].forEach(([x1,y1,x2,y2])=>{
    gx.lineWidth=3.5*sc; gx.strokeStyle='#140a02';
    gx.beginPath(); gx.moveTo(wx+x1,wy+y1); gx.lineTo(wx+x2,wy+y2); gx.stroke();
  });
  // Leaf canopy — layered ellipses with depth
  [[0,0,48*sc,40*sc,.88,'#0b2a0b'],[-.28*50*sc,.14*50*sc,34*sc,30*sc,.80,'#0d300d'],[.26*50*sc,.12*50*sc,34*sc,30*sc,.80,'#0c2c0c'],[.05*50*sc,-.18*50*sc,28*sc,22*sc,.72,'#0f340f']].forEach(([ox,oy,rx2,ry2,a,col])=>{
    gx.globalAlpha=a; gx.fillStyle=col;
    gx.beginPath(); gx.ellipse(wx+ox,wy+oy,rx2,ry2,sway,0,Math.PI*2); gx.fill();
  });
  gx.globalAlpha=1;
  // Drooping fronds
  const frondAnchs=[[-50*sc,-8*sc],[-28*sc,-4*sc],[-8*sc,4*sc],[14*sc,-4*sc],[36*sc,-8*sc],[0,4*sc],[-18*sc,-22*sc],[16*sc,-22*sc]];
  gx.lineCap='round';
  frondAnchs.forEach(([dx,dy])=>{
    for(let f=0;f<5;f++){
      const angle=sway+(f-2)*.14+dx*.002;
      const len=(50+f*14)*sc;
      gx.lineWidth=(1.2+f*.08)*sc;
      gx.strokeStyle=f%2===0?'#0e2e0e':'#122e12';
      gx.globalAlpha=.58+f*.05;
      gx.beginPath(); gx.moveTo(wx+dx,wy+dy);
      gx.bezierCurveTo(wx+dx+Math.sin(angle)*len*.26,wy+dy+len*.38,wx+dx+Math.sin(angle+sway)*.48*len,wy+dy+len*.72,wx+dx+Math.sin(angle+sway*1.4)*.36*len,wy+dy+len);
      gx.stroke();
    }
  });
  gx.globalAlpha=1;
  // Bioluminescent glow when leaf collected
  if(inventory.includes('willowleaf')){
    const gp=.08+.06*Math.sin(T*1.4);
    gx.globalAlpha=gp; gx.strokeStyle='#50d060'; gx.lineWidth=1.5;
    gx.beginPath(); gx.ellipse(wx,wy+20*sc,55*sc,95*sc,0,0,Math.PI*2); gx.stroke();
    gx.globalAlpha=gp*.5; gx.fillStyle='rgba(60,200,80,.3)';
    gx.beginPath(); gx.ellipse(wx,wy+20*sc,55*sc,95*sc,0,0,Math.PI*2); gx.fill();
    gx.globalAlpha=1;
  }
  gx.restore();
}

function drawFairy(){
  const fp=POS.fairy; if(!fp) return;
  const bob=Math.sin(T*2.4)*H*.018;
  const fx=fp.x, fy=fp.y+bob;
  const fr=Math.min(W,H)*.018;
  // Wing glow
  gx.globalAlpha=.35+.2*Math.sin(T*4);
  const wg=gx.createRadialGradient(fx,fy,0,fx,fy,fr*3);
  wg.addColorStop(0,'rgba(140,255,200,.8)'); wg.addColorStop(1,'rgba(140,255,200,0)');
  gx.fillStyle=wg; gx.beginPath(); gx.arc(fx,fy,fr*3,0,Math.PI*2); gx.fill();
  gx.globalAlpha=1;
  // Wings
  gx.globalAlpha=.55+.1*Math.sin(T*6);
  [[-1,1],[1,1]].forEach(([sx,sy])=>{
    gx.fillStyle='rgba(180,240,220,.55)';
    gx.beginPath(); gx.ellipse(fx+sx*fr*1.6,fy-fr*.3,fr*1.4,fr*.9,sx*.5,0,Math.PI*2); gx.fill();
  });
  gx.globalAlpha=1;
  // Body
  gx.fillStyle='#f0d0b8';
  gx.beginPath(); gx.arc(fx,fy,fr,0,Math.PI*2); gx.fill();
  // Wand sparkle
  const ws=.5+.5*Math.sin(T*3);
  gx.globalAlpha=.6+ws*.3;
  const wsg=gx.createRadialGradient(fx+fr*1.4,fy-fr*1.4,0,fx+fr*1.4,fy-fr*1.4,fr);
  wsg.addColorStop(0,'#ffe840'); wsg.addColorStop(1,'rgba(255,230,40,0)');
  gx.fillStyle=wsg; gx.beginPath(); gx.arc(fx+fr*1.4,fy-fr*1.4,fr,0,Math.PI*2); gx.fill();
  gx.globalAlpha=1;
  // Sparkle trail
  if(inventory.includes('fairysparkle')){
    for(let i=0;i<5;i++){
      const sa=T*2+i*.8, sr=fr*(1.8+i*.4);
      gx.globalAlpha=.3+.2*Math.sin(T*2+i);
      gx.fillStyle='#ffe840';
      gx.beginPath(); gx.arc(fx+Math.cos(sa)*sr,fy+Math.sin(sa)*sr*.5,fr*.18,0,Math.PI*2); gx.fill();
    }
    gx.globalAlpha=1;
  }
}

// Character portrait emojis drawn with canvas
function drawCharSprite(c){
  const p=POS[c.id]; if(!p) return;
  const {x,y}=p;
  const r=Math.min(W,H)*(portrait?.046:.038);
  const hasLeft=c.items.some(id=>!inventory.includes(id));
  const t3=T*2.2+c.vx*9;
  // Available glow ring
  if(hasLeft){
    const gp=.5+.5*Math.sin(t3);
    for(let ring=0;ring<2;ring++){
      gx.globalAlpha=(isPressed(c.id)?.22:(.04+gp*.06))*(1-ring*.5);
      const rg2=gx.createRadialGradient(x,y,r*(1+ring*.4),x,y,r*(2.6+ring*.4));
      rg2.addColorStop(0,c.col+'88'); rg2.addColorStop(1,'rgba(0,0,0,0)');
      gx.fillStyle=rg2; gx.beginPath(); gx.arc(x,y,r*(2.6+ring*.4),0,Math.PI*2); gx.fill();
    }
    gx.globalAlpha=1;
    // Pulsing outer ring
    gx.globalAlpha=.12+gp*.12;
    gx.strokeStyle=c.col; gx.lineWidth=1.5;
    gx.beginPath(); gx.arc(x,y,r*(1.6+Math.sin(t3)*.08),0,Math.PI*2); gx.stroke();
    gx.globalAlpha=1;
  }
  // Completed soft ring
  if(!hasLeft){
    gx.globalAlpha=.18; gx.strokeStyle='#50c060'; gx.lineWidth=1.2;
    gx.beginPath(); gx.arc(x,y,r*1.5,0,Math.PI*2); gx.stroke();
    gx.globalAlpha=1;
  }
  // Character disc
  const bg=gx.createRadialGradient(x-r*.2,y-r*.2,0,x,y,r);
  bg.addColorStop(0,isPressed(c.id)?c.col+'88':c.gCol+'44');
  bg.addColorStop(1,'rgba(4,14,30,.6)');
  gx.fillStyle=bg; gx.beginPath(); gx.arc(x,y,r,0,Math.PI*2); gx.fill();
  if(isPressed(c.id)){
    gx.strokeStyle=c.col; gx.lineWidth=2; gx.globalAlpha=.7;
    gx.beginPath(); gx.arc(x,y,r,0,Math.PI*2); gx.stroke();
    gx.globalAlpha=1;
  }
  // Skip willow (drawn separately) and fairy
  if(c.id==='willow'||c.id==='fairy') return;
  // Emoji
  const fs=r*1.22;
  const charEmojis={boy:'👦',opshop:'🛍️',tall:'🌿',wise:'🤲',dj:'🕺',moon:'🌕'};
  const em=charEmojis[c.id]||'?';
  gx.font=`${fs}px serif`; gx.textAlign='center'; gx.textBaseline='middle';
  if(c.id==='dj'&&inventory.includes('djspintable')){
    const bob=Math.sin(T*4.5)*2.5; gx.fillText(em,x,y+bob);
  } else { gx.fillText(em,x,y); }
  // Name label
  const lfs=Math.max(8,Math.min(W,H)*.016);
  gx.font=`${lfs}px 'Cormorant Garamond',serif`;
  gx.fillStyle=hasLeft?c.col+'bb':'#30703888';
  gx.textAlign='center'; gx.textBaseline='top';
  gx.fillText(portrait?c.short:c.label, x, y+r*1.3);
  // Item count badge
  if(hasLeft){
    const left=c.items.filter(id=>!inventory.includes(id)).length;
    const bx=x+r*.8, by=y-r*.8, br=r*.32;
    gx.fillStyle=c.col; gx.globalAlpha=.85;
    gx.beginPath(); gx.arc(bx,by,br,0,Math.PI*2); gx.fill();
    gx.globalAlpha=1;
    gx.font=`bold ${br*1.5}px sans-serif`;
    gx.fillStyle='#fff'; gx.textAlign='center'; gx.textBaseline='middle';
    gx.fillText(left,bx,by);
  }
}

// Player character (DJ Daddy Cool walking)
function drawPlayer(){
  const pp=playerPx();
  const r=Math.min(W,H)*(portrait?.035:.028);
  // Walk bob
  player.bobT = player.walking ? player.bobT+0.18 : 0;
  const bob=player.walking?Math.sin(player.bobT)*3:0;
  const px=pp.x, py=pp.y;
  // Shadow
  gx.globalAlpha=.3; gx.fillStyle='#000';
  gx.beginPath(); gx.ellipse(px,py+r+2,r*.7,r*.2,0,0,Math.PI*2); gx.fill();
  gx.globalAlpha=1;
  // Body glow
  const pg=gx.createRadialGradient(px,py,0,px,py,r*2);
  pg.addColorStop(0,'rgba(200,160,30,.12)'); pg.addColorStop(1,'rgba(0,0,0,0)');
  gx.fillStyle=pg; gx.beginPath(); gx.arc(px,py,r*2,0,Math.PI*2); gx.fill();
  // Silhouette — stylised DJ figure
  gx.save(); gx.translate(px,py+bob);
  // Head
  gx.fillStyle='#a87848';
  gx.beginPath(); gx.arc(0,-r*.8,r*.52,0,Math.PI*2); gx.fill();
  // Headphones arc
  gx.strokeStyle='#111'; gx.lineWidth=r*.2; gx.lineCap='round';
  gx.beginPath(); gx.arc(0,-r*.82,r*.44,Math.PI,0); gx.stroke();
  gx.fillStyle='#111';
  gx.beginPath(); gx.arc(-r*.44,-r*.82,r*.16,0,Math.PI*2); gx.fill();
  gx.beginPath(); gx.arc(r*.44,-r*.82,r*.16,0,Math.PI*2); gx.fill();
  // Body
  const dir=player.facing;
  gx.fillStyle='#1a1a2a';
  gx.beginPath();
  gx.moveTo(-r*.38,-r*.28); gx.lineTo(r*.38,-r*.28);
  gx.lineTo(r*.32,r*.5); gx.lineTo(-r*.32,r*.5); gx.closePath(); gx.fill();
  // Chain
  gx.strokeStyle='#c8a030'; gx.lineWidth=r*.08;
  gx.beginPath(); gx.arc(0,r*.05,r*.2,-.4,Math.PI+.4); gx.stroke();
  // Arms
  const armSwing=player.walking?Math.sin(player.bobT)*0.4:0;
  gx.strokeStyle='#a87848'; gx.lineWidth=r*.28; gx.lineCap='round';
  gx.beginPath(); gx.moveTo(-r*.38,-r*.1);
  gx.lineTo(-r*.7+armSwing*r*.3, r*.2+Math.cos(player.bobT)*r*.1); gx.stroke();
  gx.beginPath(); gx.moveTo(r*.38,-r*.1);
  gx.lineTo(r*.7-armSwing*r*.3, r*.2-Math.cos(player.bobT)*r*.1); gx.stroke();
  // Legs
  if(player.walking){
    const ls=Math.sin(player.bobT);
    gx.strokeStyle='#1a1a2a'; gx.lineWidth=r*.3;
    gx.beginPath(); gx.moveTo(-r*.18,r*.5); gx.lineTo(-r*.24+ls*r*.2,r*.95); gx.stroke();
    gx.beginPath(); gx.moveTo(r*.18,r*.5); gx.lineTo(r*.24-ls*r*.2,r*.95); gx.stroke();
  } else {
    gx.strokeStyle='#1a1a2a'; gx.lineWidth=r*.3;
    gx.beginPath(); gx.moveTo(-r*.18,r*.5); gx.lineTo(-r*.22,r*.95); gx.stroke();
    gx.beginPath(); gx.moveTo(r*.18,r*.5); gx.lineTo(r*.22,r*.95); gx.stroke();
  }
  // Shoes
  gx.fillStyle='#f0a000';
  gx.beginPath(); gx.ellipse(player.walking?(-r*.24+Math.sin(player.bobT)*r*.2):(-r*.22),r*.98,r*.22,r*.1,0,0,Math.PI*2); gx.fill();
  gx.beginPath(); gx.ellipse(player.walking?(r*.24-Math.sin(player.bobT)*r*.2):(r*.22),r*.98,r*.22,r*.1,0,0,Math.PI*2); gx.fill();
  gx.restore();
}

function drawDust(){
  if(player.walking&&Math.random()<.12){
    dust.push({x:player.x*W+(Math.random()-.5)*10,y:player.y*H+Math.min(W,H)*.04,
      vx:(Math.random()-.5)*.6,vy:-Math.random()*.4,life:1,r:1+Math.random()*2});
  }
  dust=dust.filter(d=>d.life>0);
  dust.forEach(d=>{
    d.x+=d.vx; d.y+=d.vy; d.life-=.04;
    gx.globalAlpha=d.life*.22; gx.fillStyle='#8a7050';
    gx.beginPath(); gx.arc(d.x,d.y,d.r,0,Math.PI*2); gx.fill();
  });
  gx.globalAlpha=1;
}

// Fireflies
let fireflies=[];
function drawFireflies(){
  if(Math.random()<.03){
    fireflies.push({x:Math.random()*W,y:H*.25+Math.random()*H*.5,
      vx:(Math.random()-.5)*.5,vy:-Math.random()*.3-.06,life:1,decay:.002+Math.random()*.004,r:.8+Math.random()*1.8});
  }
  fireflies=fireflies.filter(f=>f.life>0);
  fireflies.forEach(f=>{
    f.x+=f.vx; f.y+=f.vy; f.life-=f.decay;
    const fg=gx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*2.5);
    fg.addColorStop(0,'rgba(150,240,80,.8)'); fg.addColorStop(1,'rgba(100,200,50,0)');
    gx.globalAlpha=f.life*.5; gx.fillStyle=fg;
    gx.beginPath(); gx.arc(f.x,f.y,f.r*2.5,0,Math.PI*2); gx.fill();
  });
  gx.globalAlpha=1;
}

// ════════════════════════════════════════
//  VN PORTRAIT DRAWING
// ════════════════════════════════════════
let currentGiver=null;
function drawVNPortrait(giver){
  if(!VW||!VH) return;
  vpx.clearRect(0,0,VW,VH);
  const th=CHAR_THEMES[giver]||CHAR_THEMES.boy;
  // Background gradient
  const bg=vpx.createLinearGradient(0,0,0,VH);
  bg.addColorStop(0,th.bg[0]); bg.addColorStop(.5,th.bg[1]); bg.addColorStop(1,th.bg[2]);
  vpx.fillStyle=bg; vpx.fillRect(0,0,VW,VH);
  // Stars in portrait
  vpx.globalAlpha=.4;
  for(let i=0;i<30;i++){
    const sx=(i*137.5)%1*VW, sy=(i*97.3)%1*VH*.7;
    vpx.fillStyle='#ffffff'; vpx.globalAlpha=.1+Math.random()*.2;
    vpx.beginPath(); vpx.arc(sx,sy,Math.random()*1.2+.2,0,Math.PI*2); vpx.fill();
  }
  vpx.globalAlpha=1;
  // Central accent glow
  const cg=vpx.createRadialGradient(VW*.5,VH*.4,0,VW*.5,VH*.4,VW*.45);
  cg.addColorStop(0,th.accent+'22'); cg.addColorStop(1,'rgba(0,0,0,0)');
  vpx.fillStyle=cg; vpx.fillRect(0,0,VW,VH);
  // Large character emoji
  const charEmojis={boy:'👦',opshop:'🛍️',tall:'🌿',wise:'🤲',dj:'🎛️',willow:'🌳',moon:'🌕',fairy:'🧚'};
  const em=charEmojis[giver]||'✦';
  const efs=Math.min(VW,VH)*.38;
  vpx.font=`${efs}px serif`; vpx.textAlign='center'; vpx.textBaseline='middle';
  vpx.globalAlpha=.35;
  vpx.fillText(em, VW*.5, VH*.42);
  vpx.globalAlpha=1;
  // Decorative rings
  vpx.strokeStyle=th.accent+'30'; vpx.lineWidth=1;
  [1.2,1.6,2.0].forEach(rm=>{
    vpx.beginPath(); vpx.arc(VW*.5,VH*.42,efs*rm*.52,0,Math.PI*2); vpx.stroke();
  });
}

// ════════════════════════════════════════
//  MAIN GAME LOOP
// ════════════════════════════════════════
function loop(ts){
  T=ts/1000;
  gx.clearRect(0,0,W,H);
  resolvePos();
  drawSky(); drawStars(); drawMoon();
  drawLandscape(); drawRiver(); drawWillow();
  CHARS.forEach(c=>{
    if(c.id!=='willow'&&c.id!=='fairy') drawCharSprite(c);
  });
  drawFairy();
  // Draw willow char badge separately
  const wc=CHARS.find(c=>c.id==='willow');
  if(wc){
    const p=POS.willow;
    const r=Math.min(W,H)*(portrait?.046:.038);
    const hasLeft=wc.items.some(id=>!inventory.includes(id));
    if(hasLeft){
      const left=wc.items.filter(id=>!inventory.includes(id)).length;
      const bx=p.x+r*.8, by=p.y-r*.8, br=r*.32;
      gx.fillStyle=wc.col; gx.globalAlpha=.85;
      gx.beginPath(); gx.arc(bx,by,br,0,Math.PI*2); gx.fill();
      gx.globalAlpha=1;
      gx.font=`bold ${br*1.5}px sans-serif`;
      gx.fillStyle='#fff'; gx.textAlign='center'; gx.textBaseline='middle';
      gx.fillText(left,bx,by);
    }
  }
  drawDust();
  drawPlayer();
  drawFireflies();
  // Update player walk
  updatePlayer();
  requestAnimationFrame(loop);
}

function updatePlayer(){
  const tx=player.tx*W, ty=player.ty*H;
  const cx2=player.x*W, cy2=player.y*H;
  const dx=tx-cx2, dy=ty-cy2;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>3){
    const spd=Math.min(dist*.06, 6);
    player.x+=(dx/dist)*spd/W;
    player.y+=(dy/dist)*spd/H;
    player.walking=true;
    player.facing=dx>0?1:-1;
  } else {
    player.walking=false;
  }
}

// ════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════
let _pressed=null;
function isPressed(id){ return _pressed===id; }

function getXY(e){
  if(e.changedTouches) return [e.changedTouches[0].clientX,e.changedTouches[0].clientY];
  return [e.clientX,e.clientY];
}
function charAt(px,py){
  const hitR=Math.min(W,H)*(portrait?.068:.055);
  let best=null, bestD=Infinity;
  CHARS.forEach(c=>{
    const p=POS[c.id]; if(!p) return;
    const dx=px-p.x, dy=py-p.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<hitR*1.5&&d<bestD){bestD=d;best=c;}
  });
  return best;
}

gc.addEventListener('touchstart',e=>{
  if(storyOpen||cardOpen||invOpen) return;
  e.preventDefault();
  const [px,py]=getXY(e);
  const c=charAt(px,py);
  _pressed=c?c.id:null;
},{passive:false});

gc.addEventListener('touchend',e=>{
  if(storyOpen||cardOpen||invOpen){return;}
  e.preventDefault();
  const [px,py]=getXY(e);
  const c=charAt(px,py);
  if(c&&c.id===_pressed) onTapChar(c,px,py);
  else onTapGround(px,py);
  _pressed=null;
  document.getElementById('tap-label').style.display='none';
},{passive:false});

gc.addEventListener('click',e=>{
  if(storyOpen||cardOpen||invOpen) return;
  const [px,py]=getXY(e);
  const c=charAt(px,py);
  if(c) onTapChar(c,px,py);
  else onTapGround(px,py);
  document.getElementById('tap-label').style.display='none';
});

function onTapGround(px,py){
  // Walk player toward tapped spot
  const gy = portrait ? H*.62 : H*.66;
  if(py<gy*.85) return; // don't walk into sky
  player.tx=px/W; player.ty=Math.min(py/H,.88);
}

function onTapChar(c,px,py){
  // Walk toward character first, then open scene
  player.tx=POS[c.id].x/W; player.ty=POS[c.id].y/H;
  setTimeout(()=>openVNScene(c), 300);
}

// ════════════════════════════════════════
//  VN SCENE  (Visual Novel story flow)
// ════════════════════════════════════════
let vnPages=[], vnPageIdx=0, vnCurrentItem=null, vnCurrentChar=null;
let vnTyping=false, vnTypeTimer=null, vnCharsShown=0;

function openVNScene(c){
  const nextId=c.items.find(id=>!inventory.includes(id));
  if(!nextId){
    // All done — show outro
    vnPages=[
      {speaker:c.label, text:'You\'ve received everything I had for you.'},
      {speaker:c.label, text:'My hands are empty now — but warmer.'},
    ];
    vnCurrentItem=null; vnCurrentChar=c;
    startVN();
    return;
  }
  const item=ITEMS.find(i=>i.id===nextId);
  vnPages=[...item.pages, {speaker:'hidden', text:item.hidden, reveal:true, meaning:item.meaning}];
  vnCurrentItem=item; vnCurrentChar=c;
  startVN();
}

function startVN(){
  vnPageIdx=0; currentGiver=vnCurrentChar.id;
  // Resize portrait canvas
  setTimeout(()=>{
    VW=vpc.offsetWidth; VH=vpc.offsetHeight;
    vpc.width=VW*dpr; vpc.height=VH*dpr;
    vpx.setTransform(dpr,0,0,dpr,0,0);
    drawVNPortrait(vnCurrentChar.id);
  },50);
  // Item float
  const icon=document.getElementById('vn-item-icon');
  if(vnCurrentItem){ icon.textContent=vnCurrentItem.emoji; icon.style.display='block';}
  else { icon.style.display='none'; }
  document.getElementById('vn-hidden').classList.remove('show');
  buildDots();
  document.getElementById('vn-scene').classList.add('open');
  storyOpen=true;
  showVNPage(0);
}

function buildDots(){
  const wrap=document.getElementById('vn-progress-dots');
  wrap.innerHTML=vnPages.map((_,i)=>`<div class="vn-dot" id="vndot${i}"></div>`).join('');
  updateDots();
}
function updateDots(){
  vnPages.forEach((_,i)=>{
    const d=document.getElementById('vndot'+i);
    if(!d) return;
    d.className='vn-dot'+(i<vnPageIdx?' done':i===vnPageIdx?' active':'');
  });
}

function showVNPage(idx){
  const page=vnPages[idx];
  if(!page) return;
  document.getElementById('vn-speaker-name').textContent=page.reveal?'✦ HIDDEN MESSAGE':page.speaker;
  document.getElementById('vn-words').textContent='';
  document.getElementById('vn-hidden').classList.remove('show');
  if(page.reveal){
    // Hidden message page
    document.getElementById('vn-hidden-msg').textContent='"'+page.text+'"';
    document.getElementById('vn-hidden').classList.add('show');
    typeText('', false);
    if(vnCurrentItem) typeText(vnCurrentItem.meaning, true, '#vn-words');
  } else {
    typeText(page.text);
  }
  document.getElementById('vn-next').textContent = idx>=vnPages.length-1 ? (vnCurrentItem?'Collect Item ✦':'Close') : 'Continue →';
  updateDots();
}

function typeText(text, slow=false, targetId='#vn-words'){
  clearTimeout(vnTypeTimer);
  vnTyping=true; vnCharsShown=0;
  const el=document.querySelector(targetId);
  if(!el) return;
  if(!slow){
    el.textContent='';
    function tick(){
      if(vnCharsShown>=text.length){vnTyping=false;return;}
      el.textContent=text.slice(0,++vnCharsShown);
      vnTypeTimer=setTimeout(tick, text[vnCharsShown-1]==='.'||text[vnCharsShown-1]==='!'||text[vnCharsShown-1]==='?'?80:28);
    }
    tick();
  } else {
    el.textContent=text;
  }
}

function vnNext(){
  if(vnTyping){ // skip to end
    clearTimeout(vnTypeTimer); vnTyping=false;
    document.getElementById('vn-words').textContent=vnPages[vnPageIdx]?.text||'';
    return;
  }
  if(vnPageIdx>=vnPages.length-1){
    // Final page — collect and close
    if(vnCurrentItem) doCollect(vnCurrentItem);
    closeVNScene();
    return;
  }
  vnPageIdx++;
  showVNPage(vnPageIdx);
}

function closeVNScene(){
  document.getElementById('vn-scene').classList.remove('open');
  storyOpen=false; vnCurrentItem=null;
}

// ════════════════════════════════════════
//  COLLECT + CHAPTER
// ════════════════════════════════════════
function doCollect(item){
  inventory.push(item.id);
  unlocked.push(item.unlocks);
  if(item.id==='computer'&&inventory.includes('key')) unlocked.push('Final Hidden Message: "I\'m not going anywhere."');
  if(item.id==='fairysparkle') doSparkles();
  document.getElementById('hud-count').textContent=inventory.length+' / '+ITEMS.length;
  checkChapter();
}

function checkChapter(){
  if(chapIdx>=CHAPTERS.length-1) return;
  const next=CHAPTERS[chapIdx+1];
  if(!next.requires||inventory.includes(next.requires)){
    chapIdx++;
    document.getElementById('hud-cname').textContent=CHAPTERS[chapIdx].name;
    showChapterCard(CHAPTERS[chapIdx]);
  }
}

// ════════════════════════════════════════
//  CHAPTER CARD
// ════════════════════════════════════════
function showChapterCard(ch){
  document.getElementById('cc-eye').textContent=ch.eye;
  document.getElementById('cc-num').textContent='Chapter '+['I','II','III','IV','V','VI','VII','VIII'][ch.n-1];
  document.getElementById('cc-title').textContent=ch.name;
  document.getElementById('cc-sub').textContent=ch.sub;
  const card=document.getElementById('chapter-card');
  card.classList.add('show'); cardOpen=true;
  card.onclick=()=>{card.classList.remove('show'); cardOpen=false;};
}

// ════════════════════════════════════════
//  INVENTORY
// ════════════════════════════════════════
function openInv(){
  const scroll=document.getElementById('inv-scroll');
  if(inventory.length===0){
    scroll.innerHTML='<div class="inv-empty">Nothing collected yet.<br><br>Walk up to the glowing characters in the scene and tap them.</div>';
  } else {
    // Group by giver
    const givers=[
      {key:'boy',    label:'From The Little Boy'},
      {key:'opshop', label:'From The Op-Shop Woman'},
      {key:'tall',   label:'From The Tall Woman'},
      {key:'wise',   label:'From The Nine-Finger Wise Woman'},
      {key:'dj',     label:'From DJ Daddy Cool'},
      {key:'willow', label:'From The Willow Tree'},
      {key:'moon',   label:'From The Moon'},
      {key:'fairy',  label:'From The Fairy'},
    ];
    let html='';
    givers.forEach(g=>{
      const gItems=inventory.map(id=>ITEMS.find(i=>i.id===id)).filter(i=>i&&i.giver===g.key);
      if(!gItems.length) return;
      html+=`<div class="inv-section-label">${g.label}</div>`;
      gItems.forEach(it=>{
        html+=`<div class="icard" onclick="examineItem('${it.id}')">
          <div class="ic-icon">${it.emoji}</div>
          <div style="flex:1;min-width:0">
            <div class="ic-name">${it.name}</div>
            <div class="ic-from">Tap to examine</div>
          </div>
        </div>`;
      });
    });
    if(unlocked.length){
      html+=`<div id="inv-events-section">
        <h3>Scenes Unlocked</h3>
        <div>${unlocked.map(e=>`<span class="epill">↳ ${e}</span>`).join('')}</div>
      </div>`;
    }
    scroll.innerHTML=html;
  }
  document.getElementById('inv-overlay').classList.add('open');
  invOpen=true;
}
function closeInv(){ document.getElementById('inv-overlay').classList.remove('open'); invOpen=false; }

// ════════════════════════════════════════
//  ITEM EXAMINE
// ════════════════════════════════════════
function examineItem(id){
  const it=ITEMS.find(i=>i.id===id); if(!it) return;
  document.getElementById('ex-icon').textContent=it.emoji;
  document.getElementById('ex-name').textContent=it.name;
  document.getElementById('ex-from').textContent='from '+it.from;
  document.getElementById('ex-meaning').textContent=it.meaning;
  document.getElementById('ex-hidden').textContent='✦ "'+it.hidden+'"';
  document.getElementById('examine').classList.add('open');
}
function closeExamine(){ document.getElementById('examine').classList.remove('open'); }

// ════════════════════════════════════════
//  SPARKLES
// ════════════════════════════════════════
function doSparkles(){
  const gs=['✨','⭐','💫','🌟','·','✦','★'];
  for(let i=0;i<22;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='sp';
      const sz=.7+Math.random()*.8;
      el.style.cssText=`left:${6+Math.random()*80}%;top:${8+Math.random()*68}%;font-size:${sz}rem;animation-delay:${Math.random()*.5}s`;
      el.textContent=gs[Math.floor(Math.random()*gs.length)];
      document.body.appendChild(el); setTimeout(()=>el.remove(),1900);
    },i*55);
  }
}
