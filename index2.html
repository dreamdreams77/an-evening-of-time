<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Willow Game</title>

<style>
/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Arial',sans-serif;}

/* ===== GLOBAL ===== */
.hidden{display:none;}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;}

/* ===== INTRO SCREEN ===== */
#introScreen{
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
text-align:center;
cursor:pointer;
}
#introScreen h1{
font-size:2.4rem;
margin-bottom:1rem;
letter-spacing:2px;
}
#introScreen p{
font-size:1.2rem;
opacity:0.8;
}

/* ===== TITLE SCREEN ===== */
#titleScreen{
background:#000;
overflow:hidden;
position:absolute;
top:0;left:0;width:100%;height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
cursor:pointer;
}

/* Animated sky */
#titleSky{
position:absolute;
top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle at center,#1a1a2e,#000);
overflow:hidden;
z-index:1;
}

/* Stars */
.star{
position:absolute;
width:2px;height:2px;
background:#fff;
border-radius:50%;
opacity:0.8;
animation:twinkle 2s infinite ease-in-out;
}
@keyframes twinkle{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

/* Moon */
#moon{
position:absolute;
top:10%;left:50%;
transform:translateX(-50%);
width:140px;height:140px;
background:radial-gradient(circle,#fff,#ddd,#bbb);
border-radius:50%;
box-shadow:0 0 40px #fff;
animation:moonGlow 4s infinite ease-in-out;
z-index:2;
}
@keyframes moonGlow{
0%,100%{box-shadow:0 0 20px #fff;}
50%{box-shadow:0 0 60px #fff;}
}

/* Willow silhouette */
#willow{
position:absolute;
bottom:0;left:50%;
transform:translateX(-50%);
width:70%;
height:60%;
background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><path d="M400 600 L380 300 Q390 200 350 100 Q420 180 430 300 L420 600 Z" fill="%23000"/></svg>') no-repeat center/contain;
opacity:0.7;
animation:willowSway 6s infinite ease-in-out;
z-index:3;
}
@keyframes willowSway{
0%,100%{transform:translateX(-50%) rotate(0deg);}
50%{transform:translateX(-50%) rotate(1.5deg);}
}

/* River shimmer */
#river{
position:absolute;
bottom:0;left:0;width:100%;height:25%;
background:linear-gradient(to bottom,rgba(0,50,80,0.4),rgba(0,0,0,0.9));
animation:riverShimmer 5s infinite ease-in-out;
z-index:2;
}
@keyframes riverShimmer{
0%,100%{opacity:0.4;}
50%{opacity:0.7;}
}

/* Title text */
#titleText{
position:relative;
z-index:5;
font-size:3rem;
letter-spacing:4px;
text-shadow:0 0 10px #fff;
margin-bottom:20px;
animation:titlePulse 3s infinite ease-in-out;
}
@keyframes titlePulse{
0%,100%{opacity:0.7;}
50%{opacity:1;}
}

#titleHint{
font-size:1.2rem;
opacity:0.7;
z-index:5;
}

/* ===== GAME SCREEN ===== */
#gameScreen{
background:#111;
color:#fff;
position:absolute;
top:0;left:0;width:100%;height:100%;
overflow:hidden;
}

/* Scene container */
#sceneContainer{
position:absolute;
top:0;left:0;width:100%;height:100%;
background:#000;
}

/* Dialogue box */
#dialogueBox{
position:absolute;
bottom:0;left:0;width:100%;
background:rgba(0,0,0,0.6);
padding:20px;
font-size:1.2rem;
line-height:1.4;
}

/* Hotspots */
.hotspot{
position:absolute;
border:2px solid rgba(255,255,255,0.3);
border-radius:8px;
cursor:pointer;
}

/* ===== DJ DADDY COOL (mid‑right floating) ===== */
#djDaddyCool{
position:absolute;
right:2%;
top:45%;
transform:translateY(-50%);
width:180px;
z-index:20;
pointer-events:none;
opacity:0.95;
animation:floaty 4s ease-in-out infinite;
}
@keyframes floaty{
0%,100%{transform:translateY(-50%) translateX(0);}
50%{transform:translateY(-55%) translateX(5px);}
}
</style>
</head>
<body>

<!-- ===== INTRO SCREEN ===== -->
<div id="introScreen" class="screen">
    <h1>Welcome, Pearl</h1>
    <p>Tap to begin your journey…</p>
</div>

<!-- ===== TITLE SCREEN ===== -->
<div id="titleScreen" class="screen hidden">

    <!-- Animated sky -->
    <div id="titleSky"></div>

    <!-- Stars (random positions) -->
    <div class="star" style="top:12%;left:20%;animation-delay:0.2s;"></div>
    <div class="star" style="top:18%;left:70%;animation-delay:1.1s;"></div>
    <div class="star" style="top:30%;left:40%;animation-delay:0.6s;"></div>
    <div class="star" style="top:42%;left:15%;animation-delay:1.8s;"></div>
    <div class="star" style="top:55%;left:80%;animation-delay:0.9s;"></div>
    <div class="star" style="top:65%;left:50%;animation-delay:1.4s;"></div>

    <!-- Moon -->
    <div id="moon"></div>

    <!-- Willow silhouette -->
    <div id="willow"></div>

    <!-- River shimmer -->
    <div id="river"></div>

    <!-- Title text -->
    <div id="titleText">THE WILLOW PATH</div>
    <div id="titleHint">Tap to enter…</div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gameScreen" class="screen hidden">

    <!-- Scene container (backgrounds + hotspots go here in Part 3) -->
    <div id="sceneContainer"></div>

    <!-- Dialogue box -->
    <div id="dialogueBox"></div>

    <!-- DJ Daddy Cool (SVG added in Part 3) -->
    <div id="djDaddyCool"></div>

</div>
<!-- ===== SCENES + HOTSPOTS ===== -->
<script>
/* Scene data (backgrounds + hotspots + dialogue) */
const scenes = {
    "forestEntrance":{
        bg:"#0a0f0a",
        hotspots:[
            {id:"pathDeep",x:40,y:55,w:20,h:20,dialogue:"The path winds deeper into the forest…"},
            {id:"oldSign",x:10,y:70,w:18,h:15,dialogue:"An old wooden sign. The letters are faded."}
        ]
    },
    "deepForest":{
        bg:"#0d140d",
        hotspots:[
            {id:"glowTree",x:60,y:40,w:22,h:25,dialogue:"A willow tree glows faintly… almost alive."},
            {id:"riverEdge",x:5,y:60,w:30,h:20,dialogue:"The river hums with soft magic."}
        ]
    },
    "riverBank":{
        bg:"#0b1a26",
        hotspots:[
            {id:"stoneBoy",x:50,y:50,w:20,h:25,dialogue:"A small boy sits on a stone, humming."},
            {id:"waterSpirit",x:70,y:30,w:20,h:20,dialogue:"A shimmer moves beneath the water."}
        ]
    }
};

/* Current scene */
let currentScene = "forestEntrance";

/* Load scene */
function loadScene(name){
    currentScene = name;
    const scene = scenes[name];
    const container = document.getElementById("sceneContainer");
    container.innerHTML = "";
    container.style.background = scene.bg;

    scene.hotspots.forEach(h=>{
        const spot = document.createElement("div");
        spot.className = "hotspot";
        spot.style.left = h.x+"%";
        spot.style.top = h.y+"%";
        spot.style.width = h.w+"%";
        spot.style.height = h.h+"%";
        spot.onclick = ()=> showDialogue(h.dialogue);
        container.appendChild(spot);
    });
}

/* Dialogue */
function showDialogue(text){
    document.getElementById("dialogueBox").innerText = text;
}
</script>

<!-- ===== DJ DADDY COOL SVG (mid‑right floating) ===== -->
<script>
document.getElementById("djDaddyCool").innerHTML = `
<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
    <g>
        <!-- Body -->
        <rect x="70" y="120" width="60" height="140" rx="10" fill="#333"/>
        <!-- Head -->
        <circle cx="100" cy="80" r="40" fill="#555"/>
        <!-- Glasses -->
        <rect x="65" y="65" width="30" height="20" rx="4" fill="#000"/>
        <rect x="105" y="65" width="30" height="20" rx="4" fill="#000"/>
<!-- ===== GAME LOGIC ===== -->
<script>
/* ===== INTRO → TITLE ===== */
const introScreen = document.getElementById("introScreen");
const titleScreen = document.getElementById("titleScreen");
const gameScreen = document.getElementById("gameScreen");

introScreen.addEventListener("click",()=>{
    introScreen.classList.add("hidden");
    titleScreen.classList.remove("hidden");
});

/* ===== TITLE → GAME ===== */
titleScreen.addEventListener("click",()=>{
    titleScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    loadScene("forestEntrance");
    showDialogue("You step beneath the willow canopy…");
});

/* ===== OPTIONAL: Scene switching logic ===== */
/* You can expand this later with real navigation */
document.addEventListener("keydown",(e)=>{
    if(e.key==="1") loadScene("forestEntrance");
    if(e.key==="2") loadScene("deepForest");
    if(e.key==="3") loadScene("riverBank");
});
</script>

</body>
</html>
